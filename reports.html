<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ДШВ | СИСТЕМА ЗВІТІВ</title>
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #22c55e;
            --primary-bright: #4ade80;
            --bg: #030507;
            --card-bg: rgba(255,255,255,0.03);
            --glass-border: rgba(34,197,94,0.2);
            --red: #ef4444;
            --yellow: #eab308;
            --font: 'Exo 2', sans-serif;
        }
        * { box-sizing: border-box; }

        body {
            margin: 0; padding: 0;
            background: var(--bg);
            background-image:
                radial-gradient(circle at 50% 0%, rgba(34,197,94,0.18) 0%, transparent 50%),
                radial-gradient(circle at 10% 90%, rgba(34,197,94,0.08) 0%, transparent 30%);
            background-attachment: fixed;
            color: white; font-family: var(--font);
            user-select: none; -webkit-user-select: none;
        }

        input, textarea, select,
        .work-content, .work-content *,
        .copy-output, .copy-output * {
            user-select: text !important; -webkit-user-select: text !important;
        }

        /* ── NAV ── */
        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 14px 8%; background: rgba(0,0,0,0.85); backdrop-filter: blur(25px);
            position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid var(--glass-border);
        }
        .logo-box {
            background: var(--primary); color: black; padding: 4px 10px; border-radius: 6px;
            font-weight: 900; font-family: var(--font); box-shadow: 0 0 15px var(--primary);
            text-decoration: none; font-size: 15px; letter-spacing: 1px;
        }
        .nav-right { display: flex; align-items: center; gap: 14px; }
        .btn-admin-nav {
            display: none; background: rgba(234,179,8,0.12); border: 1px solid rgba(234,179,8,0.45);
            color: var(--yellow); padding: 7px 16px; border-radius: 10px;
            font-size: 11px; font-weight: 800; cursor: pointer;
            text-transform: uppercase; letter-spacing: 2px; font-family: var(--font); transition: 0.2s;
        }
        .btn-admin-nav:hover { background: rgba(234,179,8,0.25); }
        .btn-admin-nav.show { display: inline-block; }
        .nav-back { color: white; text-decoration: none; font-size: 12px; font-weight: 800; opacity: 0.6; font-family: var(--font); }

        .container { max-width: 1050px; margin: 40px auto; padding: 0 20px; }

        /* ── HEADER ── */
        .section-header { text-align: center; margin-bottom: 40px; }
        .section-title { font-size: 34px; font-weight: 900; margin: 0 0 8px; text-transform: uppercase; letter-spacing: 4px; font-family: var(--font); }
        .section-sub { color: var(--primary-bright); font-size: 11px; font-weight: 700; letter-spacing: 4px; text-transform: uppercase; margin: 0; }

        /* ── MODAL ── */
        .modal {
            display: none; position: fixed; z-index: 3000; inset: 0;
            background: rgba(0,0,0,0.92); backdrop-filter: blur(12px);
            align-items: center; justify-content: center;
        }
        .modal-inner {
            background: #0c0f13; border: 1px solid var(--glass-border);
            padding: 35px; border-radius: 25px; max-width: 600px; width: 92%;
            position: relative; box-shadow: 0 0 60px rgba(34,197,94,0.1);
            max-height: 90vh; overflow-y: auto;
        }
        .modal-inner.yb { border-color: rgba(234,179,8,0.3); box-shadow: 0 0 60px rgba(234,179,8,0.07); }
        .modal-inner.wide { max-width: 740px; }
        .modal-close {
            position: absolute; top: 18px; right: 20px; cursor: pointer;
            font-size: 18px; opacity: 0.35; transition: 0.2s; background: none; border: none; color: white; font-family: var(--font);
        }
        .modal-close:hover { opacity: 1; }
        .modal-title { font-size: 13px; font-weight: 900; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 22px; font-family: var(--font); }
        .modal-title.green { color: var(--primary-bright); }
        .modal-title.yellow { color: var(--yellow); }

        /* ── FORM ── */
        .report-form {
            background: var(--card-bg); border: 1px solid var(--glass-border);
            padding: 38px; border-radius: 28px; backdrop-filter: blur(20px);
            margin-bottom: 50px; box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        .input-group { margin-bottom: 22px; }
        .input-group label {
            display: block; font-size: 10px; font-weight: 800; color: var(--primary-bright);
            text-transform: uppercase; margin-bottom: 8px; letter-spacing: 2px; font-family: var(--font);
        }
        .f-input {
            width: 100%; padding: 14px 16px; background: rgba(0,0,0,0.45);
            border: 1px solid rgba(255,255,255,0.08); color: white;
            border-radius: 13px; font-family: var(--font); font-size: 14px;
            transition: border-color 0.2s; -webkit-appearance: none; appearance: none;
        }
        .f-input:focus { outline: none; border-color: var(--primary); }
        select.f-input option { background: #0c0f13; color: white; font-family: var(--font); }

        /* ── WORK ROWS ── */
        .works-section { margin-bottom: 22px; }
        .works-label { font-size: 10px; font-weight: 800; color: var(--primary-bright); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 12px; display: block; }

        .work-block {
            background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.06);
            border-radius: 14px; padding: 14px; margin-bottom: 10px;
            animation: fadeIn 0.2s ease;
        }
        @keyframes fadeIn { from{opacity:0;transform:translateY(-4px);}to{opacity:1;transform:translateY(0);} }

        .work-row-main { display: grid; grid-template-columns: 90px 1fr 190px 34px; gap: 8px; align-items: start; }

        /* Extra sub-fields shown conditionally */
        .work-extra { margin-top: 8px; display: none; }
        .work-extra.show { display: block; }
        .work-extra-label { font-size: 10px; color: #666; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }
        .work-extra-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .work-extra-row.single { grid-template-columns: 1fr; }

        /* "Відбиття нападу" has two sub-options */
        .attack-choice { display: flex; gap: 8px; margin-top: 6px; }
        .attack-opt {
            flex: 1; padding: 10px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1);
            background: rgba(0,0,0,0.3); color: #888; font-size: 12px; font-weight: 800;
            cursor: pointer; text-align: center; transition: 0.2s; font-family: var(--font);
            text-transform: uppercase; letter-spacing: 1px;
        }
        .attack-opt.selected { border-color: var(--primary); color: var(--primary-bright); background: rgba(34,197,94,0.08); }

        .points-hint { font-size: 10px; color: #555; text-align: right; margin-top: 8px; font-family: var(--font); }
        .points-hint span { color: var(--primary-bright); font-weight: 800; }

        .btn-add-row {
            background: rgba(34,197,94,0.07); border: 1px dashed rgba(34,197,94,0.3);
            color: var(--primary); padding: 12px; border-radius: 12px;
            font-size: 12px; font-weight: 800; cursor: pointer; width: 100%;
            transition: 0.2s; text-transform: uppercase; letter-spacing: 1px; font-family: var(--font);
        }
        .btn-add-row:hover { background: rgba(34,197,94,0.14); border-color: var(--primary); }

        .btn-remove-row {
            background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.25);
            color: var(--red); border-radius: 10px; font-size: 13px; cursor: pointer;
            transition: 0.2s; height: 46px; width: 34px; display: flex; align-items: center; justify-content: center;
        }
        .btn-remove-row:hover { background: rgba(239,68,68,0.22); }

        .btn-submit {
            width: 100%; background: var(--primary); color: black;
            padding: 17px; border: none; border-radius: 13px;
            font-weight: 900; cursor: pointer; text-transform: uppercase;
            font-size: 14px; letter-spacing: 2px; font-family: var(--font);
            box-shadow: 0 0 20px rgba(34,197,94,0.3); transition: 0.3s;
        }
        .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 0 35px rgba(34,197,94,0.5); }

        /* ── ADMIN SCORING TABLE ── */
        .scoring-table { width: 100%; border-collapse: collapse; margin-bottom: 16px; }
        .scoring-table th { text-align: left; font-size: 10px; color: #555; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; padding: 0 8px 10px; font-family: var(--font); }
        .scoring-table td { padding: 5px 8px; }
        .scoring-table tbody tr { border-bottom: 1px solid rgba(255,255,255,0.04); }
        .scoring-table tbody tr:last-child { border-bottom: none; }
        .work-type-name { font-size: 13px; font-weight: 700; color: #ddd; font-family: var(--font); }
        .work-type-sub { font-size: 10px; color: #555; margin-top: 2px; font-family: var(--font); }

        .score-input {
            width: 72px; padding: 8px 10px; background: rgba(0,0,0,0.45);
            border: 1px solid rgba(234,179,8,0.2); color: white;
            border-radius: 9px; font-family: var(--font); font-size: 13px; text-align: center;
        }
        .score-input:focus { outline: none; border-color: var(--yellow); }

        .btn-del-type {
            background: none; border: 1px solid rgba(239,68,68,0.25); color: var(--red);
            padding: 6px 10px; border-radius: 8px; font-size: 10px; cursor: pointer;
            font-family: var(--font); font-weight: 800; transition: 0.2s; white-space: nowrap;
        }
        .btn-del-type:hover { background: rgba(239,68,68,0.12); }

        .add-type-row { display: grid; grid-template-columns: 1fr 75px auto; gap: 8px; margin-top: 14px; }
        .add-type-row input {
            padding: 10px 12px; background: rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.08); color: white;
            border-radius: 10px; font-family: var(--font); font-size: 13px; width: 100%;
        }
        .add-type-row input:focus { outline: none; border-color: rgba(34,197,94,0.5); }
        .btn-add-type {
            background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.35);
            color: var(--primary-bright); padding: 10px 12px; border-radius: 10px;
            font-size: 11px; font-weight: 800; cursor: pointer; white-space: nowrap;
            font-family: var(--font); transition: 0.2s;
        }
        .btn-add-type:hover { background: rgba(34,197,94,0.2); }

        .btn-admin-action {
            padding: 11px 20px; border-radius: 12px; font-size: 12px; font-weight: 800;
            cursor: pointer; transition: 0.2s; text-transform: uppercase; letter-spacing: 1px; font-family: var(--font);
        }
        .btn-yellow { background: rgba(234,179,8,0.1); border: 1px solid rgba(234,179,8,0.4); color: var(--yellow); }
        .btn-yellow:hover { background: rgba(234,179,8,0.2); }
        .btn-green-outline { background: rgba(34,197,94,0.07); border: 1px solid rgba(34,197,94,0.35); color: var(--primary-bright); }
        .btn-green-outline:hover { background: rgba(34,197,94,0.16); }

        /* ── GENERATE ── */
        .filter-row { display: grid; grid-template-columns: 1fr 1fr auto; gap: 10px; margin-bottom: 18px; align-items: end; }
        .filter-label { font-size: 10px; font-weight: 800; color: #666; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 6px; font-family: var(--font); }
        .filter-input {
            width: 100%; padding: 11px 14px; background: rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.08); color: white;
            border-radius: 11px; font-family: var(--font); font-size: 13px;
        }
        .filter-input:focus { outline: none; border-color: rgba(234,179,8,0.4); }
        .btn-do-gen {
            background: var(--yellow); color: black; padding: 11px 18px;
            border: none; border-radius: 11px; font-weight: 900; cursor: pointer;
            font-size: 12px; text-transform: uppercase; letter-spacing: 1px; white-space: nowrap; font-family: var(--font);
        }
        .btn-do-gen:hover { filter: brightness(1.1); }
        .copy-output {
            background: rgba(0,0,0,0.38); border: 1px solid rgba(255,255,255,0.06);
            border-radius: 13px; padding: 18px; font-family: var(--font);
            font-size: 13px; line-height: 1.7; color: #ccc; white-space: pre-wrap;
            min-height: 80px; margin-bottom: 14px; word-break: break-word;
        }
        .btn-copy-out {
            background: var(--primary); color: black; padding: 12px 24px;
            border: none; border-radius: 11px; font-weight: 900; cursor: pointer;
            font-size: 12px; text-transform: uppercase; letter-spacing: 1px; font-family: var(--font); transition: 0.2s;
        }
        .btn-copy-out.copied { background: #3b82f6; color: white; }

        /* ── FEED ── */
        .feed-header { font-size: 11px; font-weight: 900; margin-bottom: 22px; letter-spacing: 3px; text-transform: uppercase; color: #666; }
        .report-card {
            background: rgba(255,255,255,0.02); border: 1px solid var(--glass-border);
            padding: 26px; border-radius: 20px; margin-bottom: 18px; transition: border-color 0.2s;
        }
        .report-card:hover { border-color: rgba(34,197,94,0.35); }
        .report-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; }
        .user-name { font-weight: 900; font-size: 16px; display: flex; align-items: center; gap: 10px; }
        .rank-tag { font-size: 9px; background: var(--primary); color: black; padding: 3px 8px; border-radius: 5px; font-weight: 900; letter-spacing: 1px; }
        .report-time { font-size: 11px; color: #444; font-weight: 700; }
        .date-badge {
            background: rgba(34,197,94,0.07); padding: 6px 13px; border-radius: 10px;
            color: var(--primary-bright); font-weight: 800; font-size: 12px; margin-bottom: 13px;
            display: inline-flex; align-items: center; gap: 8px; border: 1px solid rgba(34,197,94,0.18);
        }
        .work-content {
            background: rgba(0,0,0,0.2); padding: 16px; border-radius: 13px;
            font-size: 13px; line-height: 1.8; white-space: pre-wrap;
            border: 1px solid rgba(255,255,255,0.04); word-break: break-word;
        }
        .work-content a { color: #3b82f6; text-decoration: underline; font-weight: 600; }

        /* Total score bar at bottom of card */
        .score-bar-toggle {
            margin-top: 14px; display: flex; align-items: center; gap: 10px; cursor: pointer;
            background: rgba(34,197,94,0.04); border: 1px solid rgba(34,197,94,0.15);
            border-radius: 12px; padding: 9px 16px; transition: 0.2s; user-select: none; -webkit-user-select: none;
        }
        .score-bar-toggle:hover { background: rgba(34,197,94,0.09); border-color: rgba(34,197,94,0.3); }
        .score-bar-toggle-icon { font-size: 16px; }
        .score-bar-toggle-label { font-size: 11px; color: #555; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; flex: 1; }
        .score-bar-toggle-num { font-size: 18px; font-weight: 900; color: var(--primary-bright); font-family: var(--font); line-height: 1; }
        .score-bar-toggle-arrow { font-size: 11px; color: #444; transition: transform 0.25s; }
        .score-bar-toggle.open .score-bar-toggle-arrow { transform: rotate(180deg); }
        .score-bar {
            display: none; background: rgba(34,197,94,0.05);
            border: 1px solid rgba(34,197,94,0.2); border-top: none;
            border-radius: 0 0 12px 12px; padding: 10px 16px;
            flex-wrap: wrap; gap: 8px; animation: fadeIn 0.2s ease;
        }
        .score-bar.open { display: flex; }
        .score-chip {
            background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
            padding: 3px 9px; border-radius: 20px; font-size: 10px; color: #888; font-weight: 700;
        }

        .controls { display: flex; gap: 8px; margin-top: 12px; justify-content: flex-end; }
        .ctrl-btn {
            background: none; border: 1px solid rgba(255,255,255,0.1); color: #666;
            padding: 6px 12px; border-radius: 8px; font-size: 10px; font-weight: 800;
            cursor: pointer; transition: 0.2s; text-transform: uppercase; font-family: var(--font);
        }
        .ctrl-btn:hover { background: rgba(255,255,255,0.05); color: white; border-color: white; }
        .btn-del:hover { color: var(--red); border-color: var(--red); background: rgba(239,68,68,0.05); }

        /* ── TOAST ── */
        .toast {
            position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(80px);
            background: var(--primary); color: black; padding: 11px 24px; border-radius: 13px;
            font-weight: 900; font-size: 13px; letter-spacing: 1px; z-index: 9999;
            transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1); pointer-events: none;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }

        @media (max-width: 700px) {
            .container { padding: 10px; }
            .report-form { padding: 20px; }
            .work-row-main { grid-template-columns: 70px 1fr 34px; }
            .work-row-main > select { grid-column: 1 / span 2; }
            .work-extra-row { grid-template-columns: 1fr; }
            .attack-choice { flex-direction: column; }
            .filter-row { grid-template-columns: 1fr; }
            .add-type-row { grid-template-columns: 1fr auto; }
        }
    </style>
</head>
<body oncontextmenu="return false;">

<nav>
    <a href="index.html" class="logo-box">ДШВ</a>
    <div class="nav-right">
        <button class="btn-admin-nav" id="btnAdminNav" onclick="document.getElementById('modalAdmin').style.display='flex'">⚙️ АДМІН</button>
        <a href="cabinet.html" class="nav-back">← НАЗАД В КАБІНЕТ</a>
    </div>
</nav>

<div class="container">
    <div class="section-header">
        <h1 class="section-title">Система звітів</h1>
        <p class="section-sub">ЦЕНТРАЛІЗОВАНИЙ АРХІВ ДОКАЗІВ</p>
    </div>

    <!-- ══ MODAL: ADMIN ══ -->
    <div id="modalAdmin" class="modal" onclick="if(event.target==this)this.style.display='none'">
        <div class="modal-inner yb">
            <button class="modal-close" onclick="document.getElementById('modalAdmin').style.display='none'">✕</button>
            <div class="modal-title yellow">⚙️ АДМІН — НАЛАШТУВАННЯ БАЛІВ</div>
            <table class="scoring-table">
                <thead><tr>
                    <th>Вид роботи</th>
                    <th style="text-align:center;">Балів</th>
                    <th></th>
                </tr></thead>
                <tbody id="scoringBody"></tbody>
            </table>
            <div class="add-type-row">
                <input type="text" id="newTypeName" placeholder="Назва нового виду роботи...">
                <input type="number" id="newTypePoints" placeholder="Бали" min="0" max="999">
                <button class="btn-add-type" onclick="window.addWorkType()">+ ДОДАТИ</button>
            </div>
            <div style="display:flex;gap:10px;margin-top:20px;flex-wrap:wrap;">
                <button class="btn-admin-action btn-yellow" onclick="window.saveScores()">💾 ЗБЕРЕГТИ БАЛИ</button>
                <button class="btn-admin-action btn-green-outline" onclick="window.openGenModal()">📋 ГЕНЕРУВАТИ ЗВІТ</button>
            </div>
        </div>
    </div>

    <!-- ══ MODAL: GENERATE ══ -->
    <div id="modalGen" class="modal" onclick="if(event.target==this)this.style.display='none'">
        <div class="modal-inner yb wide">
            <button class="modal-close" onclick="document.getElementById('modalGen').style.display='none'">✕</button>
            <div class="modal-title yellow">📋 ГЕНЕРАЦІЯ ЗАГАЛЬНОГО ЗВІТУ</div>
            <div class="filter-row">
                <div>
                    <div class="filter-label">Нік (необов'язково)</div>
                    <input type="text" id="genNick" class="filter-input" placeholder="Фільтр за ніком...">
                </div>
                <div>
                    <div class="filter-label">Період (необов'язково)</div>
                    <input type="text" id="genPeriod" class="filter-input" placeholder="Наприклад: 19.12 - 25.12">
                </div>
                <button class="btn-do-gen" onclick="window.generateText()">ГЕНЕРУВАТИ</button>
            </div>
            <div id="genOutput" class="copy-output">— Оберіть фільтри та натисніть ГЕНЕРУВАТИ —</div>
            <button class="btn-copy-out" id="btnCopy" onclick="window.copyGenerated()">📋 СКОПІЮВАТИ</button>
        </div>
    </div>

    <!-- ══ SUBMIT FORM ══ -->
    <div class="report-form">
        <div class="input-group">
            <label>Дата звітності</label>
            <input type="text" id="repPeriod" class="f-input" placeholder="Наприклад: 19.12 – 25.12.2025">
        </div>
        <div class="works-section">
            <span class="works-label">Виконана робота та посилання на докази</span>
            <div id="workRows"></div>
            <button class="btn-add-row" onclick="window.addWorkRow()">+ ДОДАТИ РОБОТУ</button>
        </div>
        <button class="btn-submit" id="mainBtn" onclick="window.submitReport()">Опублікувати звіт</button>
    </div>

    <div class="feed-header">Архів щотижневих звітів:</div>
    <div id="reportsFeed"></div>
</div>

<div class="toast" id="toast"></div>

// ── LOAD WORK TYPES ──
async function loadWorkTypes() {

        const snap = await getDoc(doc(db, "config", "workTypes"));
        if (snap.exists() && snap.data().types) workTypes = snap.data().types;
    } catch(e) {}

// ── SCORING TABLE ──
function renderScoringTable() {
    const tbody = document.getElementById('scoringBody');
    tbody.innerHTML = workTypes.map((wt, i) => `
        <tr>
            <td>
                <div class="work-type-name">${wt.name}</div>
                ${wt.extra === 'attack' ? `<div class="work-type-sub">ВЧ: ${wt.points} б. / Блок-Пост: ${wt.pointsAlt||10} б.</div>` : ''}
                ${wt.extra === 'kraz' ? `<div class="work-type-sub">за 1 КрАЗ (50 ящиків)</div>` : ''}
            </td>
            <td style="text-align:center;">
                ${wt.extra === 'attack'
                    ? `<input type="number" class="score-input" data-idx="${i}" data-field="points" value="${wt.points}" min="0" style="margin-bottom:4px;" title="ВЧ">
                       <div style="font-size:9px;color:#555;margin-bottom:2px;">ВЧ / Блок-пост</div>
                       <input type="number" class="score-input" data-idx="${i}" data-field="pointsAlt" value="${wt.pointsAlt||10}" min="0">`
                    : `<input type="number" class="score-input" data-idx="${i}" data-field="points" value="${wt.points}" min="0" max="999">`
                }
            </td>
            <td>
                <button class="btn-del-type" onclick="window.deleteWorkType(${i})">✕</button>
            </td>
        </tr>
    `).join('');
}

window.deleteWorkType = (idx) => {
    if (workTypes.length <= 1) { showToast("❌ Потрібен хоча б 1 вид роботи"); return; }
    workTypes.splice(idx, 1);
    renderScoringTable();
    refreshAllSelects();
};

window.addWorkType = () => {
    const nameEl = document.getElementById('newTypeName');
    const ptsEl  = document.getElementById('newTypePoints');
    const name = nameEl.value.trim();
    const pts  = parseInt(ptsEl.value) || 1;
    if (!name) { showToast("❌ Введіть назву!"); return; }
    workTypes.push({ id: 'custom_' + Date.now(), name, points: pts, extra: null });
    nameEl.value = ''; ptsEl.value = '';
    renderScoringTable();
    refreshAllSelects();
    showToast("✅ Вид роботи додано!");
};

window.saveScores = async () => {
    document.querySelectorAll('.score-input').forEach(inp => {
        const idx   = parseInt(inp.getAttribute('data-idx'));
        const field = inp.getAttribute('data-field') || 'points';
        if (workTypes[idx] !== undefined) workTypes[idx][field] = parseInt(inp.value) || 0;
    });
    try {
        await setDoc(doc(db, "config", "workTypes"), { types: workTypes });
        refreshAllSelects();
        showToast("✅ Бали збережено!");
    } catch(e) { showToast("❌ Помилка збереження"); }
};

function refreshAllSelects() {
    document.querySelectorAll('.work-type-select').forEach(sel => {
        const cur = sel.value;
        sel.innerHTML = buildOptions(cur);
        const block = sel.closest('.work-block');
        if (block) onTypeChangeBlock(block, sel.value);
    });
}

function buildOptions(selectedId) {
    // Check if selectedId exists in current workTypes
    const exists = workTypes.some(wt => wt.id === selectedId);
    return workTypes.map((wt, idx) =>
        `<option value="${wt.id}"${(exists ? wt.id === selectedId : idx === 0) ? ' selected' : ''}>${wt.name}</option>`
    ).join('');
}

// ── WORK BLOCKS ──
window.addWorkRow = (prefill) => {
    const id     = rowCounter++;
    const typeId = prefill?.typeId || workTypes[0]?.id;
    const qty    = prefill?.qty    || 1;
    const link   = prefill?.link   || '';

    const block = document.createElement('div');
    block.className = 'work-block';
    block.setAttribute('data-block', id);
    block.innerHTML = `
        <div class="work-row-main">
            <input type="number" class="f-input work-qty" placeholder="К-сть" min="1" value="${qty}" oninput="window.updateHint(${id})">
            <input type="text" class="f-input work-link" placeholder="Силка (посилання на докази)" value="${link}">
            <select class="f-input work-type-select" onchange="window.onTypeChange(${id})">${buildOptions(typeId)}</select>
            <button class="btn-remove-row" onclick="window.removeRow(${id})">✕</button>
        </div>

        <!-- sub: custom name (Інше) -->
        <div class="work-extra" id="extra-custom-${id}">
            <div class="work-extra-label">Введіть свій вид роботи та кількість балів:</div>
            <div class="work-extra-row">
                <input type="text"   class="f-input work-custom-name"   placeholder="Назва роботи..." value="${prefill?.customName||''}">
                <input type="number" class="f-input work-custom-points" placeholder="Бали за 1 шт." min="0" value="${prefill?.customPoints||'0'}" oninput="window.updateHint(${id})">
            </div>
        </div>

        <!-- sub: qty label override (повістки тощо) -->
        <div class="work-extra" id="extra-qty-${id}">
            <div class="work-extra-label" id="qty-label-${id}">Кількість</div>
        </div>

        <!-- sub: КрАЗ / БК -->
        <div class="work-extra" id="extra-kraz-${id}">
            <div class="work-extra-label">Кількість КрАЗів (по 50 ящиків кожен):</div>
            <div class="work-extra-row">
                <input type="number" class="f-input work-kraz" placeholder="К-сть КрАЗів" min="1" value="${prefill?.krazCount||1}" oninput="window.updateHint(${id})">
                <input type="number" class="f-input work-boxes" placeholder="Ящиків в кожному" min="1" value="${prefill?.boxCount||50}" oninput="window.updateHint(${id})">
            </div>
            <div style="font-size:10px;color:#555;margin-top:6px;">⚠️ Потрібно щоб всі КрАЗи були видні на одному скріні</div>
        </div>

        <!-- sub: attack type -->
        <div class="work-extra" id="extra-attack-${id}">
            <div class="work-extra-label">Тип нападу:</div>
            <div class="attack-choice">
                <button class="attack-opt${(!prefill?.attackType || prefill?.attackType==='vch') ? ' selected' : ''}" data-atype="vch" onclick="window.selectAttack(${id},'vch')">⚔️ ВЧ</button>
                <button class="attack-opt${prefill?.attackType==='block' ? ' selected' : ''}" data-atype="block" onclick="window.selectAttack(${id},'block')">🛡️ Блок-Пост</button>
            </div>
        </div>

        <div class="points-hint" id="hint-${id}"></div>
    `;

    document.getElementById('workRows').appendChild(block);
    // Use the actual selected value from the DOM (may differ from prefill if typeId not found)
    const actualTypeId = block.querySelector('.work-type-select')?.value || typeId;
    onTypeChangeBlock(block, actualTypeId);
    updateHint(id);
};

window.onTypeChange = (id) => {
    const block  = document.querySelector(`[data-block="${id}"]`);
    const typeId = block?.querySelector('.work-type-select')?.value;
    if (block && typeId) onTypeChangeBlock(block, typeId);
    updateHint(id);
};

function onTypeChangeBlock(block, typeId) {
    const id  = block.getAttribute('data-block');
    const wt  = workTypes.find(w => w.id === typeId);
    const ext = wt?.extra || null;

    // hide all extras
    block.querySelectorAll('.work-extra').forEach(el => el.classList.remove('show'));

    if (ext === 'custom')    block.querySelector(`#extra-custom-${id}`)?.classList.add('show');
    else if (ext === 'kraz') block.querySelector(`#extra-kraz-${id}`)?.classList.add('show');
    else if (ext === 'attack') block.querySelector(`#extra-attack-${id}`)?.classList.add('show');
    else if (ext === 'qty_label') {
        const el = block.querySelector(`#extra-qty-${id}`);
        if (el) {
            el.classList.add('show');
            const lbl = block.querySelector(`#qty-label-${id}`);
            if (lbl && wt.qtyLabel) lbl.innerText = wt.qtyLabel + ':';
        }
    }
}

window.selectAttack = (id, atype) => {
    const block = document.querySelector(`[data-block="${id}"]`);
    block?.querySelectorAll('.attack-opt').forEach(b => b.classList.toggle('selected', b.getAttribute('data-atype') === atype));
    updateHint(id);
};

window.removeRow = (id) => {
    document.querySelector(`[data-block="${id}"]`)?.remove();
};

window.updateHint = (id) => {
    const block = document.querySelector(`[data-block="${id}"]`);
    if (!block) return;
    const typeId = block.querySelector('.work-type-select')?.value;
    const wt     = workTypes.find(w => w.id === typeId);
    const qty    = parseInt(block.querySelector('.work-qty')?.value) || 0;
    const hint   = document.getElementById(`hint-${id}`);
    if (!hint || !wt) return;

    let pts = 0; let note = '';

    if (wt.extra === 'custom') {
        const cp = parseInt(block.querySelector('.work-custom-points')?.value) || 0;
        pts = cp * qty;
        note = `${qty} × ${cp}`;
    } else if (wt.extra === 'kraz') {
        const kraz = parseInt(block.querySelector('.work-kraz')?.value) || 1;
        pts = wt.points * kraz;
        note = `${kraz} КрАЗ × ${wt.points}`;
    } else if (wt.extra === 'attack') {
        const atype = block.querySelector('.attack-opt.selected')?.getAttribute('data-atype') || 'vch';
        const ppt   = atype === 'block' ? (wt.pointsAlt || 10) : wt.points;
        pts  = ppt * qty;
        note = `${qty} × ${ppt} (${atype === 'block' ? 'Блок-Пост' : 'ВЧ'})`;
    } else {
        pts  = wt.points * qty;
        note = `${qty} × ${wt.points}`;
    }

    hint.innerHTML = `Ви отримаєте <span>${pts} балів</span> (${note})`;
};

// ── SUBMIT ──
async function sendDiscord(userObj, periodStr, isEdit) {
    try {
        await fetch(WEBHOOK_URL, {
            method:'POST', headers:{'Content-Type':'application/json'},
            body: JSON.stringify({ username:"Звіти Бот", embeds:[{
                title: isEdit ? "✏️ ЗВІТ ЗМІНЕНО" : "📅 НОВИЙ ЗВІТ",
                color: isEdit ? 16776960 : 5793266,
                description: `**Автор:** ${userObj.name} (${userObj.rank})\n**Період:** ${periodStr}`,
                footer: { text: `UID: ${userObj.uid}` },
                timestamp: new Date().toISOString()
            }]})
        });
    } catch(e) {}
}

function collectWorks() {
    const blocks = document.querySelectorAll('.work-block');
    let works = []; let total = 0; let ok = true;

    blocks.forEach(block => {
        const id     = block.getAttribute('data-block');
        const typeId = block.querySelector('.work-type-select')?.value;
        const qty    = parseInt(block.querySelector('.work-qty')?.value) || 0;
        const link   = block.querySelector('.work-link')?.value.trim() || '';
        const wt     = workTypes.find(w => w.id === typeId);

        if (!qty || !link) { ok = false; return; }

        let typeName = wt ? wt.name : typeId;
        let pts = 0; let extra = {};

        if (wt?.extra === 'custom') {
            const cn = block.querySelector('.work-custom-name')?.value.trim();
            const cp = parseInt(block.querySelector('.work-custom-points')?.value) || 0;
            if (cn) typeName = cn;
            pts = cp * qty;
            extra = { customName: cn, customPoints: cp };
        } else if (wt?.extra === 'kraz') {
            const kraz = parseInt(block.querySelector('.work-kraz')?.value) || 1;
            const boxc = parseInt(block.querySelector('.work-boxes')?.value) || 50;
            pts = (wt.points || 0) * kraz;
            extra = { krazCount: kraz, boxCount: boxc };
            typeName += ` (${kraz} КрАЗ, ${boxc} ящ./КрАЗ)`;
        } else if (wt?.extra === 'attack') {
            const atype = block.querySelector('.attack-opt.selected')?.getAttribute('data-atype') || 'vch';
            const ppt   = atype === 'block' ? (wt.pointsAlt || 10) : (wt.points || 5);
            pts = ppt * qty;
            extra = { attackType: atype };
            typeName += ` (${atype === 'block' ? 'Блок-Пост' : 'ВЧ'})`;
        } else {
            pts = (wt?.points || 0) * qty;
        }

        total += pts;
        works.push({ typeId, typeName, qty, link, pointsTotal: pts, ...extra });
    });

    return { works, total, ok };
}

window.submitReport = async () => {
    const period = document.getElementById('repPeriod').value.trim();
    if (!period) return showToast("⚠️ Вкажіть дату звітності!");
    if (!document.querySelectorAll('.work-block').length) return showToast("⚠️ Додайте хоча б одну роботу!");

    const { works, total, ok } = collectWorks();
    if (!ok) return showToast("⚠️ Заповніть кількість та силку для всіх робіт!");

    try {
        if (editId) {
            await updateDoc(doc(db, "reports", editId), { period, works, totalPoints: total, updatedAt: serverTimestamp() });
            await sendDiscord(currentUserData, period, true);
            editId = null;
            document.getElementById('mainBtn').innerText = "Опублікувати звіт";
        } else {
            await addDoc(collection(db, "reports"), {
                ownerId: currentUserData.uid,
                name: currentUserData.name,
                rank: currentUserData.rank,
                period, works, totalPoints: total,
                timestamp: serverTimestamp()
            });
            await sendDiscord(currentUserData, period, false);
        }
        document.getElementById('repPeriod').value = "";
        document.getElementById('workRows').innerHTML = "";
        rowCounter = 0;
        addWorkRow();
        showToast("✅ Звіт опубліковано!");
    } catch(e) { showToast("❌ Помилка відправки!"); }
};

// ── FEED ──
function linkify(t) {
    if (!t) return "";
    return t.replace(/(\b(https?|ftp|file):\/\/[-A-Z0-9+&@#\/%?=~_|!:,.;]*[-A-Z0-9+&@#\/%=~_|])/ig,
        '<a href="$1" target="_blank">$1</a>');
}

function buildScoreBar(data, cardId) {
    if (!data.works || !Array.isArray(data.works)) return '';
    const total = data.totalPoints ?? 0;
    const chips = data.works.map(w =>
        `<span class="score-chip">${w.typeName}: ${w.pointsTotal}б.</span>`
    ).join('');
    return `
        <div class="score-bar-toggle" id="toggle-${cardId}" onclick="toggleScoreBar('${cardId}')">
            <span class="score-bar-toggle-icon">🏆</span>
            <span class="score-bar-toggle-label">Разом балів</span>
            <span class="score-bar-toggle-num">${total}</span>
            <span class="score-bar-toggle-arrow">▼</span>
        </div>
        <div class="score-bar" id="scorebar-${cardId}">
            <div class="score-breakdown">${chips}</div>
        </div>`;
}

window.toggleScoreBar = (cardId) => {
    const toggle = document.getElementById(`toggle-${cardId}`);
    const bar    = document.getElementById(`scorebar-${cardId}`);
    if (!toggle || !bar) return;
    const isOpen = bar.classList.toggle('open');
    toggle.classList.toggle('open', isOpen);
};

function loadReports() {
    const q = query(collection(db, "reports"), orderBy("timestamp", "desc"));
    onSnapshot(q, (snapshot) => {
        allReports = [];
        const feed = document.getElementById('reportsFeed');
        feed.innerHTML = "";
        snapshot.forEach(s => {
            const data = s.data(); const id = s.id;
            allReports.push({ id, ...data });
            const time     = data.timestamp ? new Date(data.timestamp.toMillis()).toLocaleString('uk') : "";
            const isAdmin  = currentUserData?.role === 'admin';
            const isOwner  = currentUserData?.uid === data.ownerId;

            let worksHtml = '';
            if (data.works && Array.isArray(data.works)) {
                worksHtml = data.works.map((w,i) =>
                    `${i+1}. ${w.typeName} (${w.qty} раз${w.qty>1?'и':''}): <a href="${w.link}" target="_blank">${w.link}</a>`
                ).join('\n');
            } else if (data.content) {
                worksHtml = linkify(data.content);
            }

            feed.innerHTML += `
                <div class="report-card">
                    <div class="report-header">
                        <div class="user-name">👤 ${data.name} <span class="rank-tag">${data.rank}</span></div>
                        <div class="report-time">${time}</div>
                    </div>
                    <div class="date-badge">📅 ${data.period}</div>
                    <div class="work-content">${worksHtml}</div>
                    ${buildScoreBar(data, id)}
                    <div class="controls">
                        ${isOwner||isAdmin ? `<button class="ctrl-btn" onclick="window.startEdit('${id}')">РЕДАГУВАТИ</button>` : ''}
                        ${isOwner||isAdmin ? `<button class="ctrl-btn btn-del" onclick="window.deleteReport('${id}')">ВИДАЛИТИ</button>` : ''}
                    </div>
                </div>`;
        });
    });
}

// ── EDIT ──
window.startEdit = (id) => {
    const rep = allReports.find(r => r.id === id);
    if (!rep) return;
    editId = id;
    document.getElementById('repPeriod').value = rep.period || '';
    document.getElementById('workRows').innerHTML = '';
    rowCounter = 0;
    if (rep.works && Array.isArray(rep.works)) {
        rep.works.forEach(w => addWorkRow(w));
    } else { addWorkRow(); }
    document.getElementById('mainBtn').innerText = "ЗБЕРЕГТИ ЗМІНИ";
    window.scrollTo({ top: 0, behavior: 'smooth' });
};

window.deleteReport = async (id) => {
    if (confirm("Видалити звіт?")) await deleteDoc(doc(db, "reports", id));
};

// ── GENERATE ──
window.openGenModal = () => {
    document.getElementById('modalAdmin').style.display = 'none';
    document.getElementById('modalGen').style.display = 'flex';
    document.getElementById('genOutput').innerText = '— Оберіть фільтри та натисніть ГЕНЕРУВАТИ —';
};

window.generateText = () => {
    const nickF = document.getElementById('genNick').value.trim().toLowerCase();
    const perF  = document.getElementById('genPeriod').value.trim().toLowerCase();
    const list  = allReports.filter(r =>
        (!nickF || r.name.toLowerCase().includes(nickF)) &&
        (!perF  || (r.period && r.period.toLowerCase().includes(perF)))
    );
    if (!list.length) { document.getElementById('genOutput').innerText = '— Нічого не знайдено —'; return; }

    let text = '';
    list.forEach((r, idx) => {
        text += `━━━━━━━━━━━━━━━━━━━━━━━━\n`;
        text += `1. Ваш нік: ${r.name}\n`;
        text += `2. Період з якого по який: ${r.period || '—'}\n`;
        text += `3. Ваше звання: ${r.rank}\n`;
        text += `4. Виконана робота:\n`;
        if (r.works && Array.isArray(r.works)) {
            r.works.forEach((w,wi) => {
                text += `   4.${wi+1}. ${w.typeName} (${w.qty} раз${w.qty>1?'и':''}): ${w.link}\n`;
            });
            text += `5. Разом балів: ${r.totalPoints || 0}\n`;
        } else if (r.content) {
            text += r.content.split('\n').map(l=>`   ${l}`).join('\n') + '\n';
        }
        if (idx < list.length - 1) text += '\n';
    });
    document.getElementById('genOutput').innerText = text;
};

window.copyGenerated = async () => {
    const text = document.getElementById('genOutput').innerText;
    if (!text || text.startsWith('—')) return;
    try {
        await navigator.clipboard.writeText(text);
        const btn = document.getElementById('btnCopy');
        btn.innerText = '✅ СКОПІЙОВАНО!'; btn.classList.add('copied');
        setTimeout(() => { btn.innerText = '📋 СКОПІЮВАТИ'; btn.classList.remove('copied'); }, 2000);
    } catch(e) { showToast("❌ Не вдалося скопіювати"); }
};

// ── AUTH ──
onAuthStateChanged(auth, async (user) => {
    if (user) {
        const snap = await getDoc(doc(db, "users", user.uid));
        if (snap.exists()) currentUserData = { ...snap.data(), uid: user.uid };
        if (currentUserData?.role === 'admin') document.getElementById('btnAdminNav').classList.add('show');
        await loadWorkTypes();
        addWorkRow();
        loadReports();
    } else { window.location.href = "index.html"; }
});

window.showToast = (msg) => {
    const t = document.getElementById('toast');
    t.innerText = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2800);
};

<script>
    document.onkeydown = function(e) {
        if(e.keyCode==123||(e.ctrlKey&&e.shiftKey&&(e.keyCode==73||e.keyCode==74||e.keyCode==67))||(e.ctrlKey&&e.keyCode==85)) return false;
    };
    setInterval(()=>{ try{ console.clear(); }catch(e){} }, 500);
</script>
</body>
