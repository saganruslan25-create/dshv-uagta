<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ДВМС | Генератор Сертифікату</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Exo+2:wght@300;400;600;700;800;900&family=Cinzel:wght@400;700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
:root{
  --pr:#0057b7;--pb:#38a3f5;--pg:rgba(0,87,183,.35);
  --gb:rgba(0,87,183,.2);--tg:#94a3b8;--gold:#c8a84b;
  --navy:#0a1628;--sea:#1a3a6e;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  background:#030a14;
  background-image:
    radial-gradient(ellipse at 10% 20%,rgba(0,87,183,.1) 0%,transparent 50%),
    radial-gradient(ellipse at 90% 80%,rgba(0,87,183,.06) 0%,transparent 50%);
  color:#fff;
  font-family:'Exo 2',sans-serif;
  min-height:100vh;
}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:#030a14}
::-webkit-scrollbar-thumb{background:var(--pr);border-radius:10px}

nav{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 4%;
  background:rgba(3,10,20,.95);
  border-bottom:1px solid var(--gb);
  position:sticky;top:0;z-index:100;
  backdrop-filter:blur(20px);
}
.logo{
  background:var(--pr);color:#fff;
  padding:5px 14px;border-radius:8px;
  font-weight:900;font-family:'Rajdhani',sans-serif;
  font-size:16px;letter-spacing:2px;
}
.nav-title{
  font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;
  color:var(--pb);letter-spacing:3px;text-transform:uppercase;
  border:1px solid var(--gb);padding:5px 14px;border-radius:8px;
}

.container{
  display:grid;
  grid-template-columns:300px 1fr;
  gap:24px;
  padding:24px 4%;
  max-width:1200px;
  margin:0 auto;
}

.form-panel{
  background:rgba(10,16,26,.9);
  border:1px solid var(--gb);
  border-radius:16px;
  padding:20px;
  display:flex;flex-direction:column;gap:12px;
  position:sticky;top:76px;
  max-height:calc(100vh - 96px);
  overflow-y:auto;
}
.form-panel::-webkit-scrollbar{width:3px}
.form-panel::-webkit-scrollbar-thumb{background:var(--gb)}
.section-label{
  font-size:9px;font-weight:800;color:var(--tg);
  letter-spacing:3px;text-transform:uppercase;
  padding-bottom:8px;
  border-bottom:1px solid var(--gb);
}
.form-group{display:flex;flex-direction:column;gap:4px}
.form-label{font-size:9px;font-weight:800;color:var(--tg);letter-spacing:2px;text-transform:uppercase}
.form-input{
  background:rgba(255,255,255,.03);
  border:1px solid var(--gb);
  border-radius:10px;
  padding:8px 12px;
  color:#fff;
  font-family:'Exo 2',sans-serif;
  font-size:13px;font-weight:600;
  outline:none;width:100%;transition:.2s;
}
.form-input:focus{border-color:var(--pr);box-shadow:0 0 0 3px rgba(0,87,183,.15)}
.form-input::placeholder{color:#2a3a4a}
.form-input[type="date"]{color-scheme:dark}
.form-sep{height:1px;background:var(--gb);margin:2px 0}

.docs-panel{display:flex;flex-direction:column;gap:20px}
.doc-card{
  background:rgba(10,16,26,.9);
  border:1px solid var(--gb);
  border-radius:16px;
  overflow:hidden;
}
.doc-toolbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:11px 16px;
  background:rgba(0,87,183,.05);
  border-bottom:1px solid var(--gb);
}
.doc-toolbar-title{
  font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;
  color:var(--pb);letter-spacing:2px;
}
.toolbar-actions{display:flex;gap:8px}
.tbtn{
  display:flex;align-items:center;gap:5px;
  padding:6px 14px;
  border-radius:8px;font-size:12px;font-weight:700;
  cursor:pointer;border:1px solid;
  font-family:'Exo 2',sans-serif;transition:.15s;
}
.tbtn-save{background:rgba(0,87,183,.1);border-color:rgba(0,87,183,.3);color:var(--pb)}
.tbtn-save:hover{background:var(--pr);color:#fff;border-color:var(--pr)}
.tbtn-copy{background:rgba(200,168,75,.08);border-color:rgba(200,168,75,.25);color:var(--gold)}
.tbtn-copy:hover{background:var(--gold);color:#000;border-color:var(--gold)}

.doc-content{
  padding:24px;
  display:flex;justify-content:center;
  background:rgba(255,255,255,.01);
}
.doc-scale-wrap{width:100%;max-width:680px}

/* TOAST */
.toast{
  position:fixed;bottom:24px;right:24px;
  background:#0a1628;border:1px solid var(--pr);
  border-radius:12px;padding:12px 20px;
  font-size:13px;font-weight:700;color:#fff;
  z-index:9999;box-shadow:0 0 24px var(--pg);
  opacity:0;transform:translateY(8px);
  transition:all .3s;pointer-events:none;max-width:320px;
}
.toast.show{opacity:1;transform:translateY(0)}

/* ============================================================
   CERTIFICATE DVMS — official military style
   ============================================================ */
.cert-dvms{
  background:#ffffff;
  border:none;
  color:#111;
  font-family:Arial,Helvetica,sans-serif;
  position:relative;
  overflow:hidden;
  width:100%;
}

/* Outer decorative border */
.cert-border{
  position:absolute;inset:8px;
  border:2px solid #0057b7;
  border-radius:2px;
  pointer-events:none;
  z-index:1;
}
.cert-border::before{
  content:'';
  position:absolute;inset:4px;
  border:1px solid rgba(0,87,183,.3);
  border-radius:1px;
}

/* Corner ornaments */
.cert-corner{
  position:absolute;width:24px;height:24px;z-index:2;pointer-events:none;
}
.cert-corner-tl{top:8px;left:8px;border-top:3px solid #0057b7;border-left:3px solid #0057b7;}
.cert-corner-tr{top:8px;right:8px;border-top:3px solid #0057b7;border-right:3px solid #0057b7;}
.cert-corner-bl{bottom:8px;left:8px;border-bottom:3px solid #0057b7;border-left:3px solid #0057b7;}
.cert-corner-br{bottom:8px;right:8px;border-bottom:3px solid #0057b7;border-right:3px solid #0057b7;}

/* Top diagonal stripe accent */
.cert-stripe-top{
  position:absolute;top:0;right:0;
  width:0;height:0;
  border-style:solid;
  border-width:0 120px 120px 0;
  border-color:transparent rgba(0,87,183,.08) transparent transparent;
  pointer-events:none;
}
.cert-stripe-bot{
  position:absolute;bottom:0;left:0;
  width:0;height:0;
  border-style:solid;
  border-width:0 0 80px 80px;
  border-color:transparent transparent rgba(255,215,0,.06) transparent;
  pointer-events:none;
}

/* Watermark */
.cert-watermark{
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%) rotate(-30deg);
  font-family:'Cinzel',serif;
  font-size:72px;font-weight:900;
  color:rgba(0,87,183,.05);
  letter-spacing:4px;
  white-space:nowrap;
  pointer-events:none;
  z-index:0;
  user-select:none;
}

.cert-inner{
  padding:28px 36px 24px;
  position:relative;z-index:2;
}

/* Header */
.cert-header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:16px;
}
.cert-logo-left{
  width:70px;height:70px;flex-shrink:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  position:relative;
}
.cert-logo-anchor{
  font-size:36px;line-height:1;
}
.cert-logo-wave{
  font-size:11px;font-weight:900;
  color:#0057b7;letter-spacing:1px;
  font-family:'Rajdhani',sans-serif;
}
.cert-logo-right{
  width:70px;height:70px;flex-shrink:0;
  background:radial-gradient(circle at 40% 30%,#1a3a8e,#0a1628);
  border-radius:50%;
  border:2.5px solid #0057b7;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:1px;
  box-shadow:0 2px 8px rgba(0,87,183,.3);
}
.cert-logo-right-text{
  font-size:8px;font-weight:900;letter-spacing:.8px;
  color:#fff;font-family:'Rajdhani',sans-serif;
  text-align:center;line-height:1.2;
}
.cert-logo-right-trident{font-size:22px;line-height:1}

.cert-header-center{
  text-align:center;flex:1;padding:0 12px;
}
.cert-org-name{
  font-size:9.5px;font-weight:700;color:#555;
  letter-spacing:1.5px;text-transform:uppercase;
  margin-bottom:4px;
}
.cert-title-main{
  font-family:'Cinzel',serif;
  font-size:28px;font-weight:900;
  color:#0057b7;
  letter-spacing:3px;text-transform:uppercase;
  line-height:1;
  margin-bottom:3px;
}
.cert-title-sub{
  font-size:11px;font-weight:700;color:#333;
  letter-spacing:2px;text-transform:uppercase;
}

/* Divider */
.cert-divider{
  height:2px;
  background:linear-gradient(90deg,transparent,#0057b7 20%,#ffd700 50%,#0057b7 80%,transparent);
  margin:14px 0;
}
.cert-divider-thin{
  height:1px;
  background:linear-gradient(90deg,transparent,rgba(0,87,183,.4) 20%,rgba(0,87,183,.4) 80%,transparent);
  margin:10px 0;
}

/* Category */
.cert-category{
  text-align:center;
  font-size:10px;font-weight:700;color:#666;
  letter-spacing:2px;text-transform:uppercase;
  margin-bottom:12px;
}

/* Certify */
.cert-certify{
  text-align:center;
  font-size:11px;color:#555;
  margin-bottom:8px;
  font-style:italic;
}
.cert-name-block{
  text-align:center;
  margin:10px 0;
}
.cert-name{
  font-family:'Cinzel',serif;
  font-size:22px;font-weight:700;
  color:#0a1a3e;
  letter-spacing:1px;
}
.cert-desc{
  font-size:11px;font-weight:700;color:#222;
  text-align:center;
  line-height:1.9;
  margin:12px 0;
  text-transform:uppercase;
  letter-spacing:.5px;
}

/* Info row */
.cert-info-row{
  display:flex;gap:0;
  border:1.5px solid #0057b7;
  border-radius:4px;
  overflow:hidden;
  margin:12px 0;
}
.cert-info-cell{
  flex:1;
  padding:8px 12px;
  border-right:1px solid rgba(0,87,183,.25);
}
.cert-info-cell:last-child{border-right:none}
.cert-info-cell-lbl{
  font-size:7.5px;color:#777;
  text-transform:uppercase;letter-spacing:.8px;
  margin-bottom:3px;
}
.cert-info-cell-val{
  font-size:12px;font-weight:700;color:#111;
  border-bottom:1px solid #bbb;
  padding-bottom:2px;
  min-height:16px;
}

/* Footer */
.cert-footer{
  display:flex;align-items:flex-end;justify-content:space-between;
  margin-top:14px;
}
.cert-footer-seal{
  width:90px;height:90px;flex-shrink:0;
  border:2px solid rgba(0,87,183,.4);
  border-radius:50%;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  position:relative;
  background:radial-gradient(circle,rgba(0,87,183,.03),transparent);
}
.cert-footer-seal-inner{
  width:72px;height:72px;
  border:1px dashed rgba(0,87,183,.3);
  border-radius:50%;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:2px;
}
.cert-footer-seal-top{
  font-size:6px;font-weight:900;color:#0057b7;
  letter-spacing:.8px;text-transform:uppercase;
  text-align:center;line-height:1.3;
}
.cert-footer-seal-icon{font-size:18px}
.cert-footer-seal-date{
  font-size:9px;font-weight:700;color:#0057b7;
  letter-spacing:.5px;
}
.cert-footer-center{
  text-align:center;flex:1;padding:0 16px;
}
.cert-footer-num{
  font-size:9px;color:#888;letter-spacing:1px;
  margin-bottom:4px;
}
.cert-flag-stripe{
  width:80px;height:10px;
  background:linear-gradient(#0057b7 50%,#ffd700 50%);
  border-radius:2px;margin:0 auto;
}
.cert-footer-sign{
  width:140px;flex-shrink:0;text-align:center;
}
.cert-sign-line{
  border-bottom:1.5px solid #333;
  margin-bottom:4px;
  height:40px;
  display:flex;align-items:flex-end;justify-content:center;
  padding-bottom:4px;
  font-size:14px;font-style:italic;color:#555;
}
.cert-sign-name{font-size:11px;font-weight:700;color:#111;margin-bottom:1px}
.cert-sign-rank{font-size:9px;color:#555;letter-spacing:.5px}

/* Navy decoration bar */
.cert-navy-bar{
  background:linear-gradient(135deg,#0057b7 0%,#003d80 40%,#0057b7 70%,#1a5fa8 100%);
  padding:6px 36px;
  display:flex;align-items:center;justify-content:center;gap:12px;
}
.cert-navy-bar-text{
  font-size:9px;font-weight:800;color:#ffd700;
  letter-spacing:3px;text-transform:uppercase;
  font-family:'Rajdhani',sans-serif;
}
.cert-navy-bar-anchor{font-size:12px;filter:brightness(0) invert(1) sepia(1) saturate(10) hue-rotate(30deg)}

@media(max-width:900px){
  .container{grid-template-columns:1fr}
  .form-panel{position:static;max-height:none}
}
</style>
</head>
<body>

<nav>
  <div class="logo">ДВМС</div>
  <span class="nav-title">⚓ ГЕНЕРАТОР СЕРТИФІКАТУ</span>
  <div style="width:60px"></div>
</nav>

<div class="container">

  <!-- ФОРМА -->
  <div class="form-panel">
    <div class="section-label">Загальні дані</div>

    <div class="form-group">
      <label class="form-label">Звання та Прізвище Ім'я</label>
      <input class="form-input" id="f-nick" placeholder="Старшина Іван Петренко" maxlength="40" oninput="upd()">
    </div>
    <div class="form-group">
      <label class="form-label">Категорія / Підрозділ</label>
      <input class="form-input" id="f-category" placeholder="ДВМС ЗСУ" maxlength="40" oninput="upd()">
    </div>
    <div class="form-group">
      <label class="form-label">Серійний номер</label>
      <input class="form-input" id="f-serial" placeholder="ДВМС-0001" maxlength="20" oninput="upd()">
    </div>
    <div class="form-group">
      <label class="form-label">Дата видачі</label>
      <input class="form-input" id="f-date" type="date" oninput="upd()">
    </div>

    <div class="form-sep"></div>
    <div class="section-label">Текст сертифікату</div>

    <div class="form-group">
      <label class="form-label">Основний текст (2-й рядок)</label>
      <input class="form-input" id="f-desc2" placeholder="В ЛАВАХ ДЕСАНТНО-ВИСАДКОВИХ МОРСЬКИХ СИЛ" maxlength="80" oninput="upd()">
    </div>
    <div class="form-group">
      <label class="form-label">Основний текст (3-й рядок)</label>
      <input class="form-input" id="f-desc3" placeholder="ТА ДОПУЩЕНИЙ ДО ВИКОНАННЯ БОЙОВИХ ЗАВДАНЬ!" maxlength="80" oninput="upd()">
    </div>

    <div class="form-sep"></div>
    <div class="section-label">Підписант</div>

    <div class="form-group">
      <label class="form-label">Ім'я підписанта</label>
      <input class="form-input" id="f-signname" placeholder="Руслан Кущирг" maxlength="30" oninput="upd()">
    </div>
    <div class="form-group">
      <label class="form-label">Посада підписанта</label>
      <input class="form-input" id="f-signrank" placeholder="НАЧ. ДВМС" maxlength="30" oninput="upd()">
    </div>
  </div>

  <!-- ДОКУМЕНТИ -->
  <div class="docs-panel">

    <div class="doc-card">
      <div class="doc-toolbar">
        <span class="doc-toolbar-title">⚓ СЕРТИФІКАТ ВСТУПУ ДО ДВМС</span>
        <div class="toolbar-actions">
          <button class="tbtn tbtn-save" onclick="saveDoc('cert-render','Сертифікат_ДВМС')">⬇ Зберегти PNG</button>
          <button class="tbtn tbtn-copy" onclick="copyDoc('cert-render')">⧉ Копіювати</button>
        </div>
      </div>
      <div class="doc-content">
        <div class="doc-scale-wrap"><div id="cert-render"></div></div>
      </div>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

<script>
function v(id){return (document.getElementById(id)?.value||'').trim()}
function fmtD(d){
  if(!d)return '—';
  try{const p=d.split('-');return p[2]+'.'+p[1]+'.'+p[0];}
  catch(e){return d;}
}
function today(){return new Date().toISOString().split('T')[0]}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),3000);
}

function renderCert(){
  const nick      = v('f-nick')      || "Звання Прізвище Ім'я";
  const category  = v('f-category')  || 'ДВМС ЗСУ';
  const serial    = v('f-serial')    || 'ДВМС-????';
  const date      = v('f-date')      || today();
  const desc2     = v('f-desc2')     || 'В ЛАВАХ ДЕСАНТНО-ВИСАДКОВИХ МОРСЬКИХ СИЛ';
  const desc3     = v('f-desc3')     || 'ТА ДОПУЩЕНИЙ ДО ВИКОНАННЯ БОЙОВИХ ЗАВДАНЬ!';
  const signname  = v('f-signname')  || '—';
  const signrank  = v('f-signrank')  || 'НАЧ. ДВМС';

  return `
<div class="cert-dvms">
  <!-- decorations -->
  <div class="cert-border"></div>
  <div class="cert-corner cert-corner-tl"></div>
  <div class="cert-corner cert-corner-tr"></div>
  <div class="cert-corner cert-corner-bl"></div>
  <div class="cert-corner cert-corner-br"></div>
  <div class="cert-stripe-top"></div>
  <div class="cert-stripe-bot"></div>
  <div class="cert-watermark">ДВМС</div>

  <!-- navy top bar -->
  <div class="cert-navy-bar">
    <span class="cert-navy-bar-anchor">⚓</span>
    <span class="cert-navy-bar-text">Десантно-Висадкові Морські Сили Збройних Сил України</span>
    <span class="cert-navy-bar-anchor">⚓</span>
  </div>

  <div class="cert-inner">
    <!-- Header -->
    <div class="cert-header">
      <div class="cert-logo-left">
        <div class="cert-logo-anchor">⚓</div>
        <div class="cert-logo-wave">ДВМС</div>
      </div>
      <div class="cert-header-center">
        <div class="cert-org-name">Збройні Сили України · Armed Forces of Ukraine</div>
        <div class="cert-title-main">СЕРТИФІКАТ</div>
        <div class="cert-title-sub">Про вступ до підрозділу</div>
      </div>
      <div class="cert-logo-right">
        <div class="cert-logo-right-trident">🔱</div>
        <div class="cert-logo-right-text">ЗСУ<br>ДВМС</div>
      </div>
    </div>

    <div class="cert-divider"></div>

    <div class="cert-category">КАТЕГОРІЯ: ${esc(category)}</div>

    <div class="cert-certify">Засвідчує, що</div>

    <div class="cert-name-block">
      <div class="cert-name">${esc(nick)}</div>
    </div>

    <div class="cert-desc">
      УСПІШНО ВСТУПИВ ДО ПІДРОЗДІЛУ<br>
      ${esc(desc2)}<br>
      ${esc(desc3)}
    </div>

    <div class="cert-divider-thin"></div>

    <div class="cert-info-row">
      <div class="cert-info-cell">
        <div class="cert-info-cell-lbl">Серійний номер</div>
        <div class="cert-info-cell-val">${esc(serial)}</div>
      </div>
      <div class="cert-info-cell">
        <div class="cert-info-cell-lbl">Дата видачі</div>
        <div class="cert-info-cell-val">${fmtD(date)}</div>
      </div>
      <div class="cert-info-cell">
        <div class="cert-info-cell-lbl">Статус</div>
        <div class="cert-info-cell-val" style="color:#0057b7">✓ ДІЙСНИЙ</div>
      </div>
    </div>

    <!-- Footer -->
    <div class="cert-footer">
      <!-- Seal -->
      <div class="cert-footer-seal">
        <div class="cert-footer-seal-inner">
          <div class="cert-footer-seal-top">ДВМС<br>ЗСУ<br>УКРАЇНИ</div>
          <div class="cert-footer-seal-icon">🔱</div>
          <div class="cert-footer-seal-date">${fmtD(date)}</div>
        </div>
      </div>

      <!-- Center flag & serial -->
      <div class="cert-footer-center">
        <div class="cert-footer-num">№ ${esc(serial)}</div>
        <div class="cert-flag-stripe"></div>
        <div style="font-size:8px;color:#888;margin-top:4px;letter-spacing:1px;">UKRAINE · УКРАЇНА</div>
      </div>

      <!-- Signature -->
      <div class="cert-footer-sign">
        <div class="cert-sign-line">
          <span style="font-family:cursive;font-size:16px;color:#333">${esc(signname.split(' ')[0])} ___</span>
        </div>
        <div class="cert-sign-name">${esc(signname)}</div>
        <div class="cert-sign-rank">${esc(signrank)}</div>
      </div>
    </div>
  </div>
</div>`;
}

function upd(){
  document.getElementById('cert-render').innerHTML = renderCert();
}

async function saveDoc(renderId, name){
  const el = document.getElementById(renderId)?.firstElementChild;
  if(!el){showToast('❌ Документ не знайдено');return;}
  showToast('⏳ Генеруємо PNG...');
  try{
    const canvas = await html2canvas(el,{scale:3,useCORS:true,logging:false,backgroundColor:'#ffffff'});
    const a = document.createElement('a');
    a.download = name+'_'+Date.now()+'.png';
    a.href = canvas.toDataURL('image/png');
    a.click();
    showToast('✅ Збережено!');
  }catch(e){showToast('❌ Помилка: '+e.message);}
}

async function copyDoc(renderId){
  const el = document.getElementById(renderId)?.firstElementChild;
  if(!el){showToast('❌ Документ не знайдено');return;}
  showToast('⏳ Копіюємо...');
  try{
    const canvas = await html2canvas(el,{scale:3,useCORS:true,logging:false,backgroundColor:'#ffffff'});
    canvas.toBlob(async(blob)=>{
      try{
        await navigator.clipboard.write([new ClipboardItem({'image/png':blob})]);
        showToast('✅ Скопійовано в буфер обміну!');
      }catch(e2){
        const a=document.createElement('a');
        a.download='certificate.png';
        a.href=canvas.toDataURL('image/png');
        a.click();
        showToast('✅ Збережено (буфер обміну недоступний)');
      }
    },'image/png');
  }catch(e){showToast('❌ Помилка: '+e.message);}
}

document.getElementById('f-date').value = today();
upd();
</script>
</body>
</html>
