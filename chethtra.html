<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ДШВ | Генератор документів</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Exo+2:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
:root{
  --pr:#22c55e;--pb:#4ade80;--pg:rgba(34,197,94,.5);
  --bg:#030507;--cb:rgba(10,12,16,.85);--gb:rgba(34,197,94,.2);
  --dn:#ef4444;--wn:#fbbf24;--tg:#94a3b8;--bl:#38bdf8;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  background:#030507;
  background-image:
    radial-gradient(ellipse at 10% 20%,rgba(34,197,94,.07) 0%,transparent 50%),
    radial-gradient(ellipse at 90% 80%,rgba(56,189,248,.05) 0%,transparent 50%);
  color:#fff;
  font-family:'Exo 2',sans-serif;
  min-height:100vh;
}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:#05070a}
::-webkit-scrollbar-thumb{background:var(--pr);border-radius:10px}

/* NAV */
nav{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 4%;
  background:rgba(3,5,7,.95);
  border-bottom:1px solid var(--gb);
  position:sticky;top:0;z-index:100;
  backdrop-filter:blur(20px);
}
.logo{
  background:var(--pr);color:#000;
  padding:5px 14px;border-radius:8px;
  font-weight:900;font-family:'Rajdhani',sans-serif;
  font-size:16px;letter-spacing:2px;
}
.nav-title{
  font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;
  color:var(--pb);letter-spacing:3px;text-transform:uppercase;
  border:1px solid var(--gb);padding:5px 14px;border-radius:8px;
}

/* LAYOUT */
.container{
  display:grid;
  grid-template-columns:340px 1fr;
  gap:24px;
  padding:24px 4%;
  max-width:1400px;
  margin:0 auto;
}

/* FORM PANEL */
.form-panel{
  background:var(--cb);
  border:1px solid var(--gb);
  border-radius:16px;
  padding:20px;
  display:flex;flex-direction:column;gap:14px;
  position:sticky;top:80px;
  max-height:calc(100vh - 100px);
  overflow-y:auto;
}
.form-panel::-webkit-scrollbar{width:3px}
.form-panel::-webkit-scrollbar-thumb{background:var(--gb)}

.section-label{
  font-size:9px;font-weight:800;color:var(--tg);
  letter-spacing:3px;text-transform:uppercase;
  padding-bottom:8px;
  border-bottom:1px solid var(--gb);
}
.form-group{display:flex;flex-direction:column;gap:5px}
.form-label{
  font-size:9px;font-weight:800;color:var(--tg);
  letter-spacing:2px;text-transform:uppercase;
}
.form-input{
  background:rgba(255,255,255,.03);
  border:1px solid rgba(34,197,94,.2);
  border-radius:10px;
  padding:9px 13px;
  color:#fff;
  font-family:'Exo 2',sans-serif;
  font-size:13px;font-weight:600;
  outline:none;width:100%;
  transition:.2s;
}
.form-input:focus{border-color:var(--pr);box-shadow:0 0 0 3px rgba(34,197,94,.1)}
.form-input::placeholder{color:#2a3a4a}
.form-input[type="date"]::-webkit-calendar-picker-indicator{filter:invert(.5);cursor:pointer}
.form-sep{height:1px;background:var(--gb)}

/* DOCS PANEL */
.docs-panel{display:flex;flex-direction:column;gap:20px}
.doc-card{
  background:var(--cb);
  border:1px solid var(--gb);
  border-radius:16px;
  overflow:hidden;
}
.doc-toolbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px;
  background:rgba(34,197,94,.04);
  border-bottom:1px solid var(--gb);
  gap:12px;
}
.doc-toolbar-title{
  font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;
  color:var(--pb);letter-spacing:2px;
}
.toolbar-actions{display:flex;gap:8px}
.tbtn{
  display:flex;align-items:center;gap:6px;
  padding:7px 14px;
  border-radius:8px;font-size:12px;font-weight:700;
  cursor:pointer;border:1px solid;
  font-family:'Exo 2',sans-serif;
  transition:.15s;
}
.tbtn-save{
  background:rgba(34,197,94,.1);
  border-color:rgba(34,197,94,.3);
  color:var(--pr);
}
.tbtn-save:hover{background:var(--pr);color:#000;border-color:var(--pr)}
.tbtn-copy{
  background:rgba(56,189,248,.08);
  border-color:rgba(56,189,248,.25);
  color:var(--bl);
}
.tbtn-copy:hover{background:var(--bl);color:#000;border-color:var(--bl)}
.tbtn:disabled{opacity:.4;cursor:not-allowed;transform:none!important}

.doc-content{padding:20px;display:flex;justify-content:center}
.doc-scale-wrap{width:100%;max-width:560px}

/* ============================================
   TECH PASSPORT DOCUMENT
   ============================================ */
.doc-techpass{
  background:#f0f4f0;
  border-radius:10px;
  padding:20px 22px;
  color:#222;
  font-family:Arial,Helvetica,sans-serif;
  position:relative;
  overflow:hidden;
  box-shadow:0 6px 30px rgba(0,0,0,.5);
  user-select:none;
}
.doc-techpass::before{
  content:'UKRAINE';
  position:absolute;bottom:18px;right:8px;
  font-size:64px;font-weight:900;
  color:rgba(34,197,94,.07);
  letter-spacing:-2px;pointer-events:none;
}
.tp-header{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  margin-bottom:14px;
  padding-bottom:12px;
  border-bottom:2.5px solid #4a8f4a;
}
.tp-ua{
  font-size:22px;font-weight:900;color:#333;
  border:2.5px solid #333;border-radius:50%;
  width:40px;height:40px;
  display:flex;align-items:center;justify-content:center;
  font-family:Georgia,serif;flex-shrink:0;
}
.tp-center{text-align:center;font-size:9px;font-weight:700;color:#555;letter-spacing:1px;padding-top:6px}
.tp-title{
  font-size:9px;font-weight:900;color:#222;
  text-align:right;line-height:1.5;
  max-width:200px;
}
.tp-flag{
  width:34px;height:23px;
  background:linear-gradient(#0057b7 50%,#ffd700 50%);
  border-radius:2px;border:1px solid #ccc;flex-shrink:0;
}
.tp-plate{
  display:flex;align-items:center;
  margin:14px auto;
  width:fit-content;
  border:2.5px solid #222;
  border-radius:6px;overflow:hidden;
}
.tp-plate-ua{
  background:linear-gradient(#0057b7 50%,#ffd700 50%);
  color:#fff;padding:4px 6px;
  font-size:8px;font-weight:900;text-align:center;width:26px;
  line-height:1.3;
}
.tp-plate-num{
  background:#fff;color:#222;
  padding:5px 22px;
  font-size:20px;font-weight:900;
  font-family:Georgia,serif;
  letter-spacing:3px;min-width:150px;text-align:center;
}
.tp-fields{
  display:grid;grid-template-columns:1fr 1fr 1fr;
  gap:8px 14px;margin-top:14px;
}
.tp-field{border-bottom:1px solid #aaa;padding-bottom:4px}
.tp-field-lbl{font-size:7.5px;color:#777;text-transform:uppercase;letter-spacing:.8px}
.tp-field-val{font-size:12.5px;font-weight:700;color:#222;min-height:18px;font-family:Georgia,serif}

/* ============================================
   PERMIT DOCUMENT
   ============================================ */
.doc-permit{
  background:linear-gradient(135deg,#e8edf0,#f2f4f5);
  border-radius:10px;
  color:#222;
  font-family:Arial,Helvetica,sans-serif;
  position:relative;
  overflow:hidden;
  box-shadow:0 6px 30px rgba(0,0,0,.5);
  border:7px solid #c0c8d0;
  user-select:none;
}
.pm-border1{position:absolute;inset:10px;border:2px solid rgba(100,120,150,.22);border-radius:4px;pointer-events:none}
.pm-border2{position:absolute;inset:15px;border:1px solid rgba(100,120,150,.12);border-radius:3px;pointer-events:none}
.pm-inner{padding:20px 22px}
.pm-emblem{
  width:54px;height:54px;
  position:absolute;top:22px;right:26px;
  background:radial-gradient(circle,#2a5090,#1a3060);
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:28px;
  box-shadow:0 3px 10px rgba(0,0,0,.4);
}
.pm-title{text-align:center;font-size:18px;font-weight:900;text-decoration:underline;margin-bottom:3px;color:#111}
.pm-subtitle{text-align:center;font-size:9px;color:#555;margin-bottom:14px}
.pm-num{font-size:13px;font-weight:700;margin-bottom:2px}
.pm-approved{font-size:11px;font-weight:700;letter-spacing:2px;margin-bottom:1px}
.pm-decree{font-size:9.5px;color:#444;margin-bottom:14px;line-height:1.7}
.pm-heading{text-align:center;font-size:14px;font-weight:900;margin:10px 0 6px;color:#111}
.pm-text{font-size:9.5px;color:#444;margin-bottom:12px;line-height:1.75}
.pm-field{
  display:flex;align-items:baseline;gap:4px;
  margin:5px 0;font-size:11px;
  border-bottom:1px solid #888;padding-bottom:2px;
}
.pm-field-lbl{flex-shrink:0;color:#333;font-weight:600;white-space:nowrap}
.pm-field-val{flex:1;font-weight:700;font-family:Georgia,serif;font-size:12px;color:#111;min-height:16px}
.pm-footer{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:14px}
.pm-footer-item{border-bottom:1px solid #888;padding-bottom:3px;font-size:9.5px;color:#555}
.pm-footer-val{font-size:12px;font-weight:700;color:#111;font-family:Georgia,serif}

/* TOAST */
.toast{
  position:fixed;bottom:24px;right:24px;
  background:#0d1117;border:1px solid var(--pr);
  border-radius:12px;padding:12px 20px;
  font-size:13px;font-weight:700;color:#fff;
  z-index:9999;
  box-shadow:0 0 24px var(--pg);
  opacity:0;transform:translateY(8px);
  transition:all .3s;pointer-events:none;
}
.toast.show{opacity:1;transform:translateY(0)}

/* RESPONSIVE */
@media(max-width:900px){
  .container{grid-template-columns:1fr}
  .form-panel{position:static;max-height:none}
}
@media(max-width:480px){
  .container{padding:16px 3%}
  .doc-content{padding:14px}
  .tp-fields{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>

<nav>
  <div class="logo">ДШВ</div>
  <span class="nav-title">🚁 ГЕНЕРАТОР ДОКУМЕНТІВ</span>
  <div style="width:60px"></div>
</nav>

<div class="container">

  <!-- FORM -->
  <div class="form-panel">
    <div class="section-label">Загальні дані</div>

    <div class="form-group">
      <label class="form-label">Прізвище та ім'я</label>
      <input class="form-input" id="f-nick" placeholder="Тимофій Носенко" maxlength="30" oninput="upd()">
    </div>
    <div class="form-group">
      <label class="form-label">Марка спецтранспорту</label>
      <input class="form-input" id="f-brand" placeholder="Airbus Helicopters H135" maxlength="30" oninput="upd()">
    </div>
    <div class="form-group">
      <label class="form-label">Номерний знак (або залиш пустим)</label>
      <input class="form-input" id="f-plates" placeholder="АА 1234 АА" maxlength="20" oninput="upd()">
    </div>
    <div class="form-group">
      <label class="form-label">Серійний номер</label>
      <input class="form-input" id="f-serial" placeholder="ДШВ-СТ-0001" maxlength="20" oninput="upd()">
    </div>
    <div class="form-group">
      <label class="form-label">Дата реєстрації</label>
      <input class="form-input" id="f-date" type="date" oninput="upd()">
    </div>

    <div class="form-sep"></div>
    <div class="section-label">Тех. Паспорт</div>

    <div class="form-group">
      <label class="form-label">Підтверджено керівником</label>
      <input class="form-input" id="f-passBy" placeholder="Командир / Керівник" maxlength="25" oninput="upd()">
    </div>

    <div class="form-sep"></div>
    <div class="section-label">Документ Дозволу</div>

    <div class="form-group">
      <label class="form-label">Орган що видав</label>
      <input class="form-input" id="f-auth" placeholder="ДШВ ЗСУ" maxlength="30" oninput="upd()">
    </div>
    <div class="form-group">
      <label class="form-label">Висновок</label>
      <input class="form-input" id="f-conc" placeholder="Дозволено" maxlength="30" oninput="upd()">
    </div>
    <div class="form-group">
      <label class="form-label">Перевіряючий</label>
      <input class="form-input" id="f-insp" placeholder="ПІБ перевіряючого" maxlength="25" oninput="upd()">
    </div>
    <div class="form-group">
      <label class="form-label">Дозвіл дійсний до</label>
      <input class="form-input" id="f-valid" type="date" oninput="upd()">
    </div>
  </div>

  <!-- DOCUMENTS -->
  <div class="docs-panel">

    <!-- TECH PASSPORT -->
    <div class="doc-card">
      <div class="doc-toolbar">
        <span class="doc-toolbar-title">📄 ТЕХНІЧНИЙ ПАСПОРТ</span>
        <div class="toolbar-actions">
          <button class="tbtn tbtn-save" onclick="saveDoc('tp-render','Тех_Паспорт')">⬇ Зберегти PNG</button>
          <button class="tbtn tbtn-copy" onclick="copyDoc('tp-render')">⧉ Копіювати</button>
        </div>
      </div>
      <div class="doc-content">
        <div class="doc-scale-wrap">
          <div id="tp-render"></div>
        </div>
      </div>
    </div>

    <!-- PERMIT -->
    <div class="doc-card">
      <div class="doc-toolbar">
        <span class="doc-toolbar-title">✅ ДОКУМЕНТ ДОЗВОЛУ</span>
        <div class="toolbar-actions">
          <button class="tbtn tbtn-save" onclick="saveDoc('pm-render','Дозвіл')">⬇ Зберегти PNG</button>
          <button class="tbtn tbtn-copy" onclick="copyDoc('pm-render')">⧉ Копіювати</button>
        </div>
      </div>
      <div class="doc-content">
        <div class="doc-scale-wrap">
          <div id="pm-render"></div>
        </div>
      </div>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

<script>
function v(id){return (document.getElementById(id)?.value||'').trim()}
function fmtD(d){
  if(!d||d==='—')return '—';
  try{const p=d.split('-');return p[2]+'.'+p[1]+'.'+p[0];}
  catch(e){return d;}
}
function today(){return new Date().toISOString().split('T')[0]}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),3000);
}

function renderTP(){
  const nick=v('f-nick')||"Прізвище Ім'я";
  const brand=v('f-brand')||'Марка транспорту';
  const plates=v('f-plates');
  const serial=v('f-serial')||'ДШВ-СТ-????';
  const date=v('f-date')||today();
  const passBy=v('f-passBy')||'—';
  const fname=nick.split(' ')[0]||'—';
  const lname=nick.split(' ').slice(1).join(' ')||'—';
  const plateVal=plates||serial;
  return `
<div class="doc-techpass">
  <div class="tp-header">
    <div class="tp-ua">UA</div>
    <div class="tp-center">УКРАЇНА · UKRAINE · UKRAINE</div>
    <div class="tp-title">ВНУТРІШНІЙ ТЕХНІЧНИЙ ПАСПОРТ ДШВ<br>INTERNAL TECHNICAL PASSPORT DSHV<br>PASSEPORT TECHNIQUE INTERNE DSHV</div>
    <div class="tp-flag"></div>
  </div>
  <div class="tp-plate">
    <div class="tp-plate-ua"><div>🇺🇦</div><div>UA</div></div>
    <div class="tp-plate-num">${esc(plateVal)}</div>
  </div>
  <div class="tp-fields">
    <div class="tp-field"><div class="tp-field-lbl">Ім'я власника</div><div class="tp-field-val">${esc(fname)}</div></div>
    <div class="tp-field"><div class="tp-field-lbl">Дата реєстрації</div><div class="tp-field-val">${fmtD(date)}</div></div>
    <div class="tp-field"><div class="tp-field-lbl">Підтверджено керівником</div><div class="tp-field-val">${esc(passBy)}</div></div>
    <div class="tp-field"><div class="tp-field-lbl">Прізвище власника</div><div class="tp-field-val">${esc(lname)}</div></div>
    <div class="tp-field"><div class="tp-field-lbl">Кількість власників</div><div class="tp-field-val">1</div></div>
    <div class="tp-field"><div class="tp-field-lbl">Відмітка</div><div class="tp-field-val">${esc(brand)}</div></div>
  </div>
</div>`;
}

function renderPM(){
  const nick=v('f-nick')||"Прізвище Ім'я";
  const brand=v('f-brand')||'Марка транспорту';
  const serial=v('f-serial')||'ДШВ-СТ-????';
  const date=v('f-date')||today();
  const auth=v('f-auth')||'ДШВ ЗСУ';
  const conc=v('f-conc')||'Дозволено';
  const insp=v('f-insp')||'—';
  const valid=v('f-valid')||'';
  return `
<div class="doc-permit">
  <div class="pm-border1"></div>
  <div class="pm-border2"></div>
  <div class="pm-emblem">🦅</div>
  <div class="pm-inner">
    <div class="pm-title">ЗАТВЕРДЖЕННЯ!</div>
    <div class="pm-subtitle">Форма первинної облікової документації</div>
    <div class="pm-num">№ <strong>${esc(serial)}</strong></div>
    <div class="pm-approved">З А Т В Е Р Д Ж Е Н О</div>
    <div class="pm-decree">Наказ ДШВ Збройних Сил України<br>"___" __________ 20___ р.</div>
    <div class="pm-heading">ОФІЦІЙНЕ ЗАТВЕРДЖЕННЯ</div>
    <div class="pm-text">Довідка видана за результатом перевірки керівництва ДШВ та ЗСУ. Підтверджує надання дозволу на реєстрацію транспорту <strong>${esc(brand)}</strong>.</div>
    <div class="pm-field"><span class="pm-field-lbl">1. Прізвище та ім'я</span><span class="pm-field-val">${esc(nick)}</span></div>
    <div class="pm-field"><span class="pm-field-lbl">2. Дата реєстрації</span><span class="pm-field-val">${fmtD(date)}</span></div>
    <div class="pm-field"><span class="pm-field-lbl">4. Орган що видав:</span><span class="pm-field-val">${esc(auth)}</span></div>
    <div class="pm-field"><span class="pm-field-lbl">5. Висновок:</span><span class="pm-field-val">${esc(conc)}</span></div>
    <div class="pm-field"><span class="pm-field-lbl">6. Дозвіл дійсний до:</span><span class="pm-field-val">${fmtD(valid)}</span></div>
    <div class="pm-footer">
      <div class="pm-footer-item">Перевіряючий:<div class="pm-footer-val">${esc(insp)}</div></div>
      <div class="pm-footer-item">Дата:<div class="pm-footer-val">${fmtD(date)}</div></div>
    </div>
  </div>
</div>`;
}

function upd(){
  document.getElementById('tp-render').innerHTML=renderTP();
  document.getElementById('pm-render').innerHTML=renderPM();
}

async function saveDoc(renderId, name){
  const el=document.getElementById(renderId)?.firstElementChild;
  if(!el){showToast('❌ Документ не знайдено');return;}
  showToast('⏳ Генеруємо PNG...');
  try{
    const canvas=await html2canvas(el,{
      scale:3,useCORS:true,logging:false,
      backgroundColor:null
    });
    const a=document.createElement('a');
    a.download=name+'_'+Date.now()+'.png';
    a.href=canvas.toDataURL('image/png');
    a.click();
    showToast('✅ Збережено: '+a.download);
  }catch(e){showToast('❌ Помилка: '+e.message);}
}

async function copyDoc(renderId){
  const el=document.getElementById(renderId)?.firstElementChild;
  if(!el){showToast('❌ Документ не знайдено');return;}
  showToast('⏳ Копіюємо...');
  try{
    const canvas=await html2canvas(el,{
      scale:3,useCORS:true,logging:false,
      backgroundColor:null
    });
    canvas.toBlob(async(blob)=>{
      try{
        await navigator.clipboard.write([new ClipboardItem({'image/png':blob})]);
        showToast('✅ Скопійовано в буфер обміну!');
      }catch(e2){
        const a=document.createElement('a');
        a.download='document.png';
        a.href=canvas.toDataURL('image/png');
        a.click();
        showToast('✅ Збережено (буфер обміну недоступний)');
      }
    },'image/png');
  }catch(e){showToast('❌ Помилка: '+e.message);}
}

// Init
document.getElementById('f-date').value=today();
upd();
</script>
</body>
</html>
