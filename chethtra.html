<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ДШВ | Генератор документів</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Exo+2:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
:root{
  --pr:#22c55e;--pb:#4ade80;--pg:rgba(34,197,94,.4);
  --gb:rgba(34,197,94,.2);--tg:#94a3b8;--bl:#38bdf8;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  background:#030507;
  background-image:
    radial-gradient(ellipse at 10% 20%,rgba(34,197,94,.07) 0%,transparent 50%),
    radial-gradient(ellipse at 90% 80%,rgba(56,189,248,.05) 0%,transparent 50%);
  color:#fff;
  font-family:'Exo 2',sans-serif;
  min-height:100vh;
}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:#05070a}
::-webkit-scrollbar-thumb{background:var(--pr);border-radius:10px}

nav{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 4%;
  background:rgba(3,5,7,.95);
  border-bottom:1px solid var(--gb);
  position:sticky;top:0;z-index:100;
  backdrop-filter:blur(20px);
}
.logo{
  background:var(--pr);color:#000;
  padding:5px 14px;border-radius:8px;
  font-weight:900;font-family:'Rajdhani',sans-serif;
  font-size:16px;letter-spacing:2px;
}
.nav-title{
  font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;
  color:var(--pb);letter-spacing:3px;text-transform:uppercase;
  border:1px solid var(--gb);padding:5px 14px;border-radius:8px;
}

.container{
  display:grid;
  grid-template-columns:320px 1fr;
  gap:24px;
  padding:24px 4%;
  max-width:1300px;
  margin:0 auto;
}

.form-panel{
  background:rgba(10,12,16,.85);
  border:1px solid var(--gb);
  border-radius:16px;
  padding:20px;
  display:flex;flex-direction:column;gap:12px;
  position:sticky;top:76px;
  max-height:calc(100vh - 96px);
  overflow-y:auto;
}
.form-panel::-webkit-scrollbar{width:3px}
.form-panel::-webkit-scrollbar-thumb{background:var(--gb)}
.section-label{
  font-size:9px;font-weight:800;color:var(--tg);
  letter-spacing:3px;text-transform:uppercase;
  padding-bottom:8px;
  border-bottom:1px solid var(--gb);
}
.form-group{display:flex;flex-direction:column;gap:4px}
.form-label{font-size:9px;font-weight:800;color:var(--tg);letter-spacing:2px;text-transform:uppercase}
.form-input{
  background:rgba(255,255,255,.03);
  border:1px solid rgba(34,197,94,.2);
  border-radius:10px;
  padding:8px 12px;
  color:#fff;
  font-family:'Exo 2',sans-serif;
  font-size:13px;font-weight:600;
  outline:none;width:100%;transition:.2s;
}
.form-input:focus{border-color:var(--pr);box-shadow:0 0 0 3px rgba(34,197,94,.1)}
.form-input::placeholder{color:#2a3a4a}
.form-input[type="date"]{color-scheme:dark}
.form-sep{height:1px;background:var(--gb);margin:2px 0}

.docs-panel{display:flex;flex-direction:column;gap:20px}
.doc-card{
  background:rgba(10,12,16,.85);
  border:1px solid var(--gb);
  border-radius:16px;
  overflow:hidden;
}
.doc-toolbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:11px 16px;
  background:rgba(34,197,94,.04);
  border-bottom:1px solid var(--gb);
}
.doc-toolbar-title{
  font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;
  color:var(--pb);letter-spacing:2px;
}
.toolbar-actions{display:flex;gap:8px}
.tbtn{
  display:flex;align-items:center;gap:5px;
  padding:6px 14px;
  border-radius:8px;font-size:12px;font-weight:700;
  cursor:pointer;border:1px solid;
  font-family:'Exo 2',sans-serif;transition:.15s;
}
.tbtn-save{background:rgba(34,197,94,.1);border-color:rgba(34,197,94,.3);color:var(--pr)}
.tbtn-save:hover{background:var(--pr);color:#000;border-color:var(--pr)}
.tbtn-copy{background:rgba(56,189,248,.08);border-color:rgba(56,189,248,.25);color:var(--bl)}
.tbtn-copy:hover{background:var(--bl);color:#000;border-color:var(--bl)}

.doc-content{
  padding:24px;
  display:flex;justify-content:center;
  background:rgba(255,255,255,.02);
}
.doc-scale-wrap{width:100%;max-width:620px}

/* ============================================================
   TECH PASSPORT — white official style
   ============================================================ */
.doc-techpass{
  background:#ffffff;
  border:2px solid #5a9a5a;
  border-radius:4px;
  color:#111;
  font-family:Arial,Helvetica,sans-serif;
  position:relative;
  overflow:hidden;
}
.tp-top{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:14px 18px 12px;
  border-bottom:2px solid #5a9a5a;
  gap:10px;
}
.tp-ua-circle{
  width:40px;height:40px;flex-shrink:0;
  border:2.5px solid #222;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-weight:900;font-size:13px;color:#222;
  font-family:Arial,sans-serif;letter-spacing:0;
}
.tp-ua-label{
  font-size:10px;font-weight:700;color:#444;
  letter-spacing:.8px;
  flex:1;text-align:center;
}
.tp-titles{
  text-align:right;line-height:1.5;
  font-size:9.5px;font-weight:900;color:#111;
  max-width:230px;
}
.tp-flag{
  width:32px;height:21px;flex-shrink:0;
  background:linear-gradient(#0057b7 50%,#ffd700 50%);
  border-radius:2px;border:1px solid #bbb;
}

.tp-plate-row{
  display:flex;justify-content:center;
  padding:14px 18px 10px;
}
.tp-plate{
  display:flex;align-items:stretch;
  border:2.5px solid #222;
  border-radius:5px;overflow:hidden;
}
.tp-plate-ua-block{
  background:linear-gradient(#0057b7 50%,#ffd700 50%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:4px 7px;width:30px;gap:1px;
}
.tp-plate-ua-flag{font-size:12px;line-height:1}
.tp-plate-ua-text{font-size:7px;font-weight:900;color:#fff;letter-spacing:.5px}
.tp-plate-num{
  background:#ffffff;color:#111;
  padding:6px 24px;
  font-size:22px;font-weight:900;
  font-family:'Courier New',Courier,monospace;
  letter-spacing:3px;
  min-width:160px;text-align:center;
  display:flex;align-items:center;justify-content:center;
}

.tp-fields{
  display:grid;grid-template-columns:1fr 1fr 1fr;
  padding:10px 18px 16px;
  position:relative;
}
.tp-fields::after{
  content:'UKRAINE';
  position:absolute;bottom:8px;right:10px;
  font-size:38px;font-weight:900;
  color:rgba(80,150,80,.1);
  letter-spacing:-1px;pointer-events:none;
  font-family:Arial,sans-serif;
}
.tp-field{padding:6px 10px 6px 0}
.tp-field-lbl{
  font-size:7.5px;color:#777;
  text-transform:uppercase;letter-spacing:.7px;
  margin-bottom:3px;
}
.tp-field-val{
  font-size:13.5px;font-weight:700;color:#111;
  min-height:18px;
  border-bottom:1px solid #bbb;
  padding-bottom:3px;
}

/* ============================================================
   PERMIT DOCUMENT — white official style
   ============================================================ */
.doc-permit{
  background:#ffffff;
  border:2px solid #aab4be;
  border-radius:4px;
  color:#111;
  font-family:Arial,Helvetica,sans-serif;
  position:relative;
  overflow:hidden;
}
.pm-inner{padding:18px 22px}

.pm-header-row{
  display:flex;align-items:flex-start;
  margin-bottom:6px;
}
.pm-header-center{flex:1;text-align:center}
.pm-emblem{
  width:48px;height:48px;flex-shrink:0;
  background:radial-gradient(circle at 40% 40%,#3060a0,#1a3060);
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:24px;
  box-shadow:0 2px 6px rgba(0,0,0,.2);
  margin-top:2px;
}
.pm-title{
  font-size:18px;font-weight:900;
  text-decoration:underline;
  color:#111;margin-bottom:2px;
  letter-spacing:.3px;
}
.pm-subtitle{font-size:9px;color:#555}

.pm-num{font-size:12.5px;font-weight:700;margin:10px 0 1px;color:#111}
.pm-approved{font-size:11px;font-weight:700;letter-spacing:2px;color:#111;margin-bottom:1px}
.pm-decree{font-size:9px;color:#444;margin-bottom:12px;line-height:1.8}
.pm-heading{
  text-align:center;font-size:13.5px;font-weight:900;
  margin:0 0 5px;color:#111;letter-spacing:.3px;
  text-decoration:none;
}
.pm-desc{font-size:9.5px;color:#333;margin-bottom:10px;line-height:1.75}

.pm-field{
  display:flex;align-items:baseline;
  font-size:11px;
  border-bottom:1px solid #888;
  padding:4px 0 3px;
  margin-bottom:1px;
}
.pm-field-lbl{color:#111;font-weight:700;white-space:nowrap;margin-right:6px;flex-shrink:0}
.pm-field-val{font-weight:700;color:#111;font-size:12px;flex:1}

.pm-footer{
  display:grid;grid-template-columns:1fr 1fr;
  gap:16px;margin-top:10px;
  border-top:1px solid #bbb;
  padding-top:8px;
}
.pm-footer-item{font-size:9px;color:#555}
.pm-footer-val{font-size:13px;font-weight:700;color:#111;margin-top:2px}

/* TOAST */
.toast{
  position:fixed;bottom:24px;right:24px;
  background:#0d1117;border:1px solid var(--pr);
  border-radius:12px;padding:12px 20px;
  font-size:13px;font-weight:700;color:#fff;
  z-index:9999;box-shadow:0 0 24px var(--pg);
  opacity:0;transform:translateY(8px);
  transition:all .3s;pointer-events:none;max-width:320px;
}
.toast.show{opacity:1;transform:translateY(0)}

@media(max-width:900px){
  .container{grid-template-columns:1fr}
  .form-panel{position:static;max-height:none}
}
@media(max-width:500px){
  .tp-fields{grid-template-columns:1fr 1fr}
  .container{padding:14px 3%}
  .doc-content{padding:12px}
}
</style>
</head>
<body>

<nav>
  <div class="logo">ДШВ</div>
  <span class="nav-title">🚁 ГЕНЕРАТОР ДОКУМЕНТІВ</span>
  <div style="width:60px"></div>
</nav>

<div class="container">

  <!-- ФОРМА -->
  <div class="form-panel">
    <div class="section-label">Загальні дані</div>

    <div class="form-group">
      <label class="form-label">Прізвище та ім'я</label>
      <input class="form-input" id="f-nick" placeholder="Руслан Кущирг" maxlength="30" oninput="upd()">
    </div>
    <div class="form-group">
      <label class="form-label">Марка спецтранспорту</label>
      <input class="form-input" id="f-brand" placeholder="Audi A6 C8" maxlength="30" oninput="upd()">
    </div>
    <div class="form-group">
      <label class="form-label">Номерний знак (або залиш пустим)</label>
      <input class="form-input" id="f-plates" placeholder="АА 1234 АА" maxlength="20" oninput="upd()">
    </div>
    <div class="form-group">
      <label class="form-label">Серійний номер</label>
      <input class="form-input" id="f-serial" placeholder="ДШВ-СТ-0002" maxlength="20" oninput="upd()">
    </div>
    <div class="form-group">
      <label class="form-label">Дата реєстрації</label>
      <input class="form-input" id="f-date" type="date" oninput="upd()">
    </div>

    <div class="form-sep"></div>
    <div class="section-label">Тех. Паспорт</div>

    <div class="form-group">
      <label class="form-label">Підтверджено керівником</label>
      <input class="form-input" id="f-passBy" placeholder="Руслан Кущирг" maxlength="25" oninput="upd()">
    </div>

    <div class="form-sep"></div>
    <div class="section-label">Документ Дозволу</div>

    <div class="form-group">
      <label class="form-label">Орган що видав</label>
      <input class="form-input" id="f-auth" placeholder="ДШВ ЗСУ" maxlength="30" oninput="upd()">
    </div>
    <div class="form-group">
      <label class="form-label">Висновок</label>
      <input class="form-input" id="f-conc" placeholder="Підтверджено" maxlength="30" oninput="upd()">
    </div>
    <div class="form-group">
      <label class="form-label">Перевіряючий</label>
      <input class="form-input" id="f-insp" placeholder="Руслан Кущирг" maxlength="25" oninput="upd()">
    </div>
    <div class="form-group">
      <label class="form-label">Дата перевірки</label>
      <input class="form-input" id="f-checkdate" type="date" oninput="upd()">
    </div>
    <div class="form-group">
      <label class="form-label">Дозвіл дійсний до</label>
      <input class="form-input" id="f-valid" type="date" oninput="upd()">
    </div>
  </div>

  <!-- ДОКУМЕНТИ -->
  <div class="docs-panel">

    <div class="doc-card">
      <div class="doc-toolbar">
        <span class="doc-toolbar-title">📄 ТЕХНІЧНИЙ ПАСПОРТ</span>
        <div class="toolbar-actions">
          <button class="tbtn tbtn-save" onclick="saveDoc('tp-render','Тех_Паспорт')">⬇ Зберегти PNG</button>
          <button class="tbtn tbtn-copy" onclick="copyDoc('tp-render')">⧉ Копіювати</button>
        </div>
      </div>
      <div class="doc-content">
        <div class="doc-scale-wrap"><div id="tp-render"></div></div>
      </div>
    </div>

    <div class="doc-card">
      <div class="doc-toolbar">
        <span class="doc-toolbar-title">✅ ДОКУМЕНТ ДОЗВОЛУ</span>
        <div class="toolbar-actions">
          <button class="tbtn tbtn-save" onclick="saveDoc('pm-render','Дозвіл')">⬇ Зберегти PNG</button>
          <button class="tbtn tbtn-copy" onclick="copyDoc('pm-render')">⧉ Копіювати</button>
        </div>
      </div>
      <div class="doc-content">
        <div class="doc-scale-wrap"><div id="pm-render"></div></div>
      </div>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

<script>
function v(id){return (document.getElementById(id)?.value||'').trim()}
function fmtD(d){
  if(!d)return '—';
  try{const p=d.split('-');return p[2]+'.'+p[1]+'.'+p[0];}
  catch(e){return d;}
}
function today(){return new Date().toISOString().split('T')[0]}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),3000);
}

function renderTP(){
  const nick   = v('f-nick')  || "Прізвище Ім'я";
  const brand  = v('f-brand') || 'Марка транспорту';
  const plates = v('f-plates');
  const serial = v('f-serial')|| 'ДШВ-СТ-????';
  const date   = v('f-date')  || today();
  const passBy = v('f-passBy')|| '—';
  const fname  = nick.split(' ')[0] || '—';
  const lname  = nick.split(' ').slice(1).join(' ') || '—';
  const plateVal = plates || serial;
  return `
<div class="doc-techpass">
  <div class="tp-top">
    <div class="tp-ua-circle">UA</div>
    <div class="tp-ua-label">УКРАЇНА · UKRAINE · UKRAINE</div>
    <div class="tp-titles">ВНУТРІШНІЙ ТЕХНІЧНИЙ ПАСПОРТ ДШВ<br>INTERNAL TECHNICAL PASSPORT DSHV<br>PASSEPORT TECHNIQUE INTERNE DSHV</div>
    <div class="tp-flag"></div>
  </div>
  <div class="tp-plate-row">
    <div class="tp-plate">
      <div class="tp-plate-ua-block">
        <span class="tp-plate-ua-flag">🇺🇦</span>
        <span class="tp-plate-ua-text">UA</span>
      </div>
      <div class="tp-plate-num">${esc(plateVal)}</div>
    </div>
  </div>
  <div class="tp-fields">
    <div class="tp-field"><div class="tp-field-lbl">ІМ'Я ВЛАСНИКА</div><div class="tp-field-val">${esc(fname)}</div></div>
    <div class="tp-field"><div class="tp-field-lbl">ДАТА РЕЄСТРАЦІЇ</div><div class="tp-field-val">${fmtD(date)}</div></div>
    <div class="tp-field"><div class="tp-field-lbl">ПІДТВЕРДЖЕНО КЕРІВНИКОМ</div><div class="tp-field-val">${esc(passBy)}</div></div>
    <div class="tp-field"><div class="tp-field-lbl">ПРІЗВИЩЕ ВЛАСНИКА</div><div class="tp-field-val">${esc(lname)}</div></div>
    <div class="tp-field"><div class="tp-field-lbl">КІЛЬКІСТЬ ВЛАСНИКІВ</div><div class="tp-field-val">1</div></div>
    <div class="tp-field"><div class="tp-field-lbl">ВІДМІТКА</div><div class="tp-field-val">${esc(brand)}</div></div>
  </div>
</div>`;
}

function renderPM(){
  const nick      = v('f-nick')      || "Прізвище Ім'я";
  const brand     = v('f-brand')     || 'Марка транспорту';
  const serial    = v('f-serial')    || 'ДШВ-СТ-????';
  const date      = v('f-date')      || today();
  const auth      = v('f-auth')      || 'ДШВ ЗСУ';
  const conc      = v('f-conc')      || 'Підтверджено';
  const insp      = v('f-insp')      || '—';
  const valid     = v('f-valid')     || '';
  const checkdate = v('f-checkdate') || date;
  return `
<div class="doc-permit">
  <div class="pm-inner">
    <div class="pm-header-row">
      <div class="pm-header-center">
        <div class="pm-title">ЗАТВЕРДЖЕННЯ!</div>
        <div class="pm-subtitle">Форма первинної облікової документації</div>
      </div>
      <div class="pm-emblem">🦅</div>
    </div>
    <div class="pm-num">№ <strong>${esc(serial)}</strong></div>
    <div class="pm-approved">З А Т В Е Р Д Ж Е Н О</div>
    <div class="pm-decree">Наказ ДШВ Збройних Сил України<br>"___" __________ 20___ р.</div>
    <div class="pm-heading">ОФІЦІЙНЕ ЗАТВЕРДЖЕННЯ</div>
    <div class="pm-desc">Довідка видана за результатом перевірки керівництва ДШВ та ЗСУ. Підтверджує надання дозволу на реєстрацію транспорту <strong>${esc(brand)}</strong>.</div>
    <div class="pm-field"><span class="pm-field-lbl">1. Прізвище та ім'я</span><span class="pm-field-val">${esc(nick)}</span></div>
    <div class="pm-field"><span class="pm-field-lbl">2. Дата реєстрації</span><span class="pm-field-val">${fmtD(date)}</span></div>
    <div class="pm-field"><span class="pm-field-lbl">4. Орган що видав:</span><span class="pm-field-val">${esc(auth)}</span></div>
    <div class="pm-field"><span class="pm-field-lbl">5. Висновок:</span><span class="pm-field-val">${esc(conc)}</span></div>
    <div class="pm-field"><span class="pm-field-lbl">6. Дозвіл дійсний до:</span><span class="pm-field-val">${fmtD(valid)}</span></div>
    <div class="pm-footer">
      <div class="pm-footer-item">Перевіряючий:<div class="pm-footer-val">${esc(insp)}</div></div>
      <div class="pm-footer-item">Дата:<div class="pm-footer-val">${fmtD(checkdate)}</div></div>
    </div>
  </div>
</div>`;
}

function upd(){
  document.getElementById('tp-render').innerHTML = renderTP();
  document.getElementById('pm-render').innerHTML = renderPM();
}

async function saveDoc(renderId, name){
  const el = document.getElementById(renderId)?.firstElementChild;
  if(!el){showToast('❌ Документ не знайдено');return;}
  showToast('⏳ Генеруємо PNG...');
  try{
    const canvas = await html2canvas(el,{scale:3,useCORS:true,logging:false,backgroundColor:'#ffffff'});
    const a = document.createElement('a');
    a.download = name+'_'+Date.now()+'.png';
    a.href = canvas.toDataURL('image/png');
    a.click();
    showToast('✅ Збережено!');
  }catch(e){showToast('❌ Помилка: '+e.message);}
}

async function copyDoc(renderId){
  const el = document.getElementById(renderId)?.firstElementChild;
  if(!el){showToast('❌ Документ не знайдено');return;}
  showToast('⏳ Копіюємо...');
  try{
    const canvas = await html2canvas(el,{scale:3,useCORS:true,logging:false,backgroundColor:'#ffffff'});
    canvas.toBlob(async(blob)=>{
      try{
        await navigator.clipboard.write([new ClipboardItem({'image/png':blob})]);
        showToast('✅ Скопійовано в буфер обміну!');
      }catch(e2){
        const a=document.createElement('a');
        a.download='document.png';
        a.href=canvas.toDataURL('image/png');
        a.click();
        showToast('✅ Збережено (буфер обміну недоступний)');
      }
    },'image/png');
  }catch(e){showToast('❌ Помилка: '+e.message);}
}
